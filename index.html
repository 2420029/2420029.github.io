<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日ピン研ビューア v2 — 都道府県別＋業種フィルター</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --content-fs: 14px;
    --primary: #2563eb;
    --primary-light: #eff6ff;
    --primary-dark: #1d4ed8;
    --bg: #f1f5f9;
    --card: #fff;
    --border: #e2e8f0;
    --text: #0f172a;
    --muted: #64748b;
    --sub-muted: #94a3b8;
    --accent: #ea580c;
    --sidebar-w: 280px;
  }
  body {
    font-family: 'Helvetica Neue', Arial, 'Hiragino Sans', sans-serif;
    background: var(--bg); color: var(--text);
    font-size: var(--content-fs); padding-top: 50px;
    -webkit-text-size-adjust: 100%;
  }

  /* Header */
  header {
    position: fixed; top: 0; left: 0; right: 0;
    height: 50px; background: var(--card);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center;
    padding: 0 10px; gap: 6px;
    z-index: 100;
  }
  .icon-btn {
    width: 36px; height: 36px;
    border: 1px solid var(--border); background: #f8fafc;
    border-radius: 8px; cursor: pointer;
    font-size: 16px; display: flex;
    align-items: center; justify-content: center;
    flex-shrink: 0; transition: background .1s;
    font-family: inherit; color: inherit;
  }
  .icon-btn:hover:not(:disabled) { background: var(--bg); }
  .icon-btn:disabled { opacity: .35; cursor: not-allowed; }
  #breadcrumb {
    flex: 1; font-size: 12px; color: var(--muted);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    line-height: 1.3;
  }
  #breadcrumb .crumb-current { color: var(--text); font-weight: 600; font-size: 13px; }
  #breadcrumb .crumb-sep { color: var(--sub-muted); margin: 0 4px; }

  /* Sidebar */
  #sidebar {
    position: fixed; top: 50px; bottom: 0; left: 0;
    width: var(--sidebar-w); background: var(--card);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    transform: translateX(-100%);
    transition: transform .25s ease;
    z-index: 90;
  }
  #sidebar.open { transform: translateX(0); }
  @media (min-width: 980px) {
    #sidebar { transform: translateX(0); }
    main { margin-left: var(--sidebar-w); }
    #btn-menu { display: none; }
  }
  #sidebar-overlay {
    position: fixed; top: 50px; bottom: 0; left: 0; right: 0;
    background: rgba(0,0,0,0.4); z-index: 80;
    opacity: 0; pointer-events: none; transition: opacity .25s;
  }
  #sidebar-overlay.open { opacity: 1; pointer-events: auto; }
  @media (min-width: 980px) { #sidebar-overlay { display: none; } }

  /* Sidebar nav items */
  .nav-section { padding: 8px 0; }
  .nav-section-hd {
    padding: 6px 16px; font-size: 11px; color: var(--muted);
    text-transform: uppercase; letter-spacing: .05em; font-weight: 700;
  }
  .nav-region {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 16px; font-weight: 600; cursor: pointer;
    border-bottom: 1px solid var(--border);
    user-select: none;
  }
  .nav-region:hover { background: var(--primary-light); }
  .nav-region .nav-arrow {
    transition: transform .15s; display: inline-block;
    font-size: 12px; color: var(--muted);
  }
  .nav-region.expanded .nav-arrow { transform: rotate(90deg); }
  .nav-region .nav-cnt {
    font-size: 11px; color: var(--primary); font-weight: 700;
    background: var(--primary-light); padding: 2px 8px; border-radius: 12px;
    margin-left: auto; margin-right: 8px;
  }
  .nav-prefs { display: none; background: #f8fafc; }
  .nav-prefs.expanded { display: block; }
  .nav-pref {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 16px 8px 36px; cursor: pointer;
    font-size: 13px; border-bottom: 1px solid #f1f5f9;
  }
  .nav-pref:hover { background: var(--primary-light); }
  .nav-pref.active {
    background: var(--primary-light); color: var(--primary); font-weight: 600;
    border-left: 3px solid var(--primary); padding-left: 33px;
  }
  .nav-pref .nav-cnt {
    font-size: 11px; color: var(--muted); font-weight: 600;
  }

  /* Main */
  main {
    padding: 12px;
    transition: margin-left .25s ease;
    min-height: calc(100vh - 50px);
  }
  .container { max-width: 880px; margin: 0 auto; }

  .page-title {
    font-size: 18px; font-weight: 700; margin-bottom: 4px;
  }
  .page-sub { font-size: 12px; color: var(--muted); margin-bottom: 12px; }

  /* Filter dashboard */
  .filter-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; margin-bottom: 12px; overflow: hidden;
  }
  .filter-toggle {
    padding: 10px 14px; cursor: pointer;
    display: flex; justify-content: space-between; align-items: center;
    user-select: none; font-weight: 600;
  }
  .filter-toggle:hover { background: #f8fafc; }
  .filter-toggle .filter-arrow {
    transition: transform .15s; font-size: 12px; color: var(--muted);
  }
  .filter-card.expanded .filter-arrow { transform: rotate(90deg); }
  .filter-body {
    display: none; padding: 0 14px 14px;
    border-top: 1px solid var(--border);
  }
  .filter-card.expanded .filter-body { display: block; }
  .filter-row {
    margin-top: 12px;
    display: flex; flex-wrap: wrap; align-items: center; gap: 8px;
  }
  .filter-label {
    font-size: 12px; color: var(--muted); font-weight: 600;
    min-width: 60px;
  }
  .btype-chip {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 4px 10px; border: 1px solid var(--border);
    border-radius: 16px; cursor: pointer; font-size: 13px;
    background: #f8fafc; user-select: none;
  }
  .btype-chip.active {
    background: var(--primary); color: #fff; border-color: var(--primary);
  }
  .btype-chip .chip-cnt {
    font-size: 11px; opacity: .8;
  }
  .filter-input {
    flex: 1; min-width: 160px; height: 32px; padding: 0 10px;
    border: 1px solid var(--border); border-radius: 6px;
    font-size: 13px; font-family: inherit;
  }
  .filter-btn {
    height: 32px; padding: 0 12px; border-radius: 6px;
    border: 1px solid var(--border); background: #f8fafc;
    cursor: pointer; font-size: 12px; font-family: inherit;
  }
  .filter-btn.primary {
    background: var(--primary); color: #fff; border-color: var(--primary);
  }
  .filter-btn:hover { opacity: .85; }

  /* Shop / location list */
  .loc-section { margin-bottom: 16px; }
  .loc-hd {
    font-size: 13px; font-weight: 700; padding: 6px 12px;
    background: var(--primary-light); color: var(--primary);
    border-left: 4px solid var(--primary);
    border-radius: 0 6px 6px 0; margin-bottom: 6px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .loc-hd .loc-meta { font-size: 11px; color: var(--muted); font-weight: 500; }

  .shop-list { display: flex; flex-direction: column; gap: 4px; }
  .shop-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; overflow: hidden;
  }
  .shop-hd {
    padding: 8px 12px; cursor: pointer;
    display: flex; align-items: center; gap: 8px;
    user-select: none;
  }
  .shop-hd:hover { background: #f8fafc; }
  .shop-card.expanded .shop-hd { background: var(--primary-light); }
  .shop-arrow {
    color: var(--muted); transition: transform .15s; font-size: 11px;
  }
  .shop-card.expanded .shop-arrow { transform: rotate(90deg); }
  .btype-badge {
    font-size: 10px; padding: 2px 6px; border-radius: 4px;
    background: var(--accent); color: #fff; font-weight: 700;
    flex-shrink: 0;
  }
  .btype-badge.btype-ピンサロ        { background: #ec4899; }
  .btype-badge.btype-ヘルス          { background: #f59e0b; }
  .btype-badge.btype-ソープ          { background: #ef4444; }
  .btype-badge.btype-デリヘル        { background: #8b5cf6; }
  .btype-badge.btype-エステ          { background: #10b981; }
  .btype-badge.btype-キャバ・セクキャバ { background: #14b8a6; }
  .btype-badge.btype-ストリップ      { background: #6366f1; }
  .btype-badge.btype-新地            { background: #d946ef; }
  .btype-badge.btype-体験記          { background: #6b7280; }
  .btype-badge.btype-その他          { background: #94a3b8; }
  .btype-badge.btype-不明            { background: #cbd5e1; color: var(--text); }
  .shop-name { flex: 1; font-size: 13px; word-break: break-all; }
  .shop-cnt {
    font-size: 11px; color: var(--primary); font-weight: 700;
    background: #fff; padding: 2px 8px; border-radius: 12px;
    border: 1px solid var(--border); flex-shrink: 0;
  }
  .reports-list {
    display: none; padding: 4px 12px 8px;
    border-top: 1px solid var(--border);
    background: #fafbfc;
  }
  .shop-card.expanded .reports-list { display: block; }
  .report-item {
    padding: 6px 8px; cursor: pointer;
    border-bottom: 1px solid #f1f5f9;
    display: flex; gap: 8px; align-items: flex-start;
    border-radius: 4px;
  }
  .report-item:hover { background: var(--primary-light); }
  .report-item:last-child { border-bottom: 0; }
  .report-year {
    font-size: 11px; color: var(--muted); font-weight: 600;
    white-space: nowrap; padding-top: 1px;
  }
  .report-text {
    font-size: 12px; word-break: break-all; line-height: 1.4;
  }

  /* Loading */
  .loading {
    text-align: center; padding: 40px 20px; color: var(--muted);
  }
  .prog-bar-bg {
    height: 6px; background: var(--border); border-radius: 3px;
    margin: 16px 0 6px; max-width: 400px; margin-left: auto; margin-right: auto;
  }
  .prog-bar {
    height: 6px; background: var(--primary); border-radius: 3px;
    width: 0; transition: width .3s;
  }
  #prog-text { font-size: 12px; }

  /* Report body */
  .report-body {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 16px;
    word-break: break-word; line-height: 1.6;
  }
  .report-body img { max-width: 100%; height: auto; }
  .report-body a { color: var(--primary); }
  .report-body table { max-width: 100%; }

  .error {
    color: #dc2626; padding: 12px;
    background: #fef2f2; border: 1px solid #fecaca;
    border-radius: 8px;
  }
  .ext-link {
    display: inline-block; margin-top: 8px; font-size: 13px;
    color: var(--primary); text-decoration: none;
  }
  .ext-link:hover { text-decoration: underline; }
  .empty { padding: 40px 20px; text-align: center; color: var(--muted); }

  /* Home cards */
  .home-grid {
    display: grid; gap: 10px;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    margin-bottom: 18px;
  }
  .home-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px; cursor: pointer;
    text-align: center; transition: all .1s;
  }
  .home-card:hover { background: var(--primary-light); border-color: var(--primary); }
  .home-card .hc-name { font-weight: 600; margin-bottom: 4px; }
  .home-card .hc-cnt { font-size: 11px; color: var(--primary); font-weight: 700; }
</style>
</head>

</main>

function isNoise(loc) {
  if (!loc) return true;
  if (NOISE_EXACT.has(loc)) return true;
  if (/^[\d０-９]+$/.test(loc)) return true;
  if (/^[０-９の]+[\d０-９]+$/.test(loc)) return true;
  if (/^[\d０-９][\d０-９]+$/.test(loc)) return true;
  if (/^R\d+年/.test(loc)) return true;
  if (/^H\d+年/.test(loc)) return true;
  if (/^皇紀\d+/.test(loc)) return true;
  if (/\d{4}年版$/.test(loc)) return true;
  if (/^\d{4}\.\d+$/.test(loc)) return true;
  if (/^\d{4}\.\d+現在$/.test(loc)) return true;
  if (/R\d+\.\d+現在$/.test(loc)) return true;
  if (/\d+現在$/.test(loc)) return true;
  if (/\d+月\d+日現在$/.test(loc)) return true;
  if (/^\d{2}\.\d{2}版$/.test(loc)) return true;
  if (/H\d{2}\.\d{2}\.\d{2}版$/.test(loc)) return true;
  if (/版$/.test(loc) && /[\d\.]+/.test(loc)) return true;
  if (/ by /.test(loc)) return true;
  if (/） by /.test(loc)) return true;
  if (/\) by /.test(loc)) return true;
  if (/法$/.test(loc) && loc.length <= 8) return true;
  if (['性感染症','抗生物質','摘発モデルの導入','コストパフォーマンス',
       '児童ポルノ関連法','性感マッサージ','韓国式エステ'].includes(loc)) return true;
  if (/^改訂\d+版$/.test(loc)) return true;
  if (/^第\d+版/.test(loc)) return true;
  if (/^「/.test(loc)) return true;
  return false;
}

function normalizeLocation(loc) {
  if (!loc) return null;
  if (/編$/.test(loc) && loc.length >= 3) {
    const base = loc.replace(/編$/, '');
    if (base.length < 2) return null;
    return base;
  }
  if (/市$/.test(loc) && loc.length >= 3) {
    const base = loc.replace(/市$/, '');
    if (LOC_PREF[base]) return base;
  }
  return loc;
}

function extractLocation(text) {
  let m = text.match(/」（([^）\)・･]{1,20})/);
  if (m) return m[1].trim();
  m = text.match(/」\(([^）\)・･]{1,20})/);
  if (m) return m[1].trim();
  m = text.match(/（([^）\)・･]{1,10})[）\)]/);
  if (m) return m[1].trim();
  return null;
}

function extractShopName(text) {
  const m = text.match(/「([^」]+)」/);
  if (m) return m[1].trim();
  return text.trim();
}

function classify(loc) {
  if (OVERSEAS_COUNTRY[loc]) return { isOverseas: true, country: OVERSEAS_COUNTRY[loc] };
  if (LOC_PREF[loc]) return {
    isOverseas: false,
    pref: LOC_PREF[loc],
    subregion: SUBREGION_MAP[loc] || null,
  };
  return { isOverseas: false, pref: '不明', subregion: null };
}

function btypeFromUrl(url) {
  if (!url) return '不明';
  // 特殊フォルダ
  if (/\/papers\//i.test(url))   return '体験記';
  if (/\/kaimu/i.test(url))      return '開店閉店';

  // /rptXX/{prefix}_{code}{...}.htm
  const m = url.match(/\/rpt\d*\/[a-z0-9]+_([a-z][a-z0-9]*)\.htm/i);
  if (!m) return '不明';
  const code = m[1].toLowerCase();

  // 4文字以上の prefix（長い順）
  if (/^salo/.test(code)) return 'ピンサロ';
  if (/^sale/.test(code)) return 'ピンサロ';
  if (/^sald/.test(code)) return 'ピンサロ';
  if (/^soap/.test(code)) return 'ソープ';
  if (/^helt/.test(code)) return 'ヘルス';
  if (/^hell/.test(code)) return 'ヘルス';
  if (/^derh/.test(code)) return 'デリヘル';
  if (/^estt/.test(code)) return 'エステ';

  // 3文字 prefix
  if (/^sal/.test(code))  return 'ピンサロ';
  if (/^soa/.test(code))  return 'ソープ';
  if (/^hel/.test(code))  return 'ヘルス';
  if (/^der/.test(code))  return 'デリヘル';
  if (/^cab/.test(code))  return 'キャバ・セクキャバ';
  if (/^str/.test(code))  return 'ストリップ';
  if (/^est/.test(code))  return 'エステ';
  if (/^etc/.test(code))  return 'その他';
  if (/^tyo/.test(code))  return '新地';

  // 2文字 prefix
  if (/^sa/.test(code))   return 'ピンサロ';
  if (/^so/.test(code))   return 'ソープ';
  if (/^he/.test(code))   return 'ヘルス';
  if (/^de/.test(code))   return 'デリヘル';
  if (/^ca/.test(code))   return 'キャバ・セクキャバ';
  if (/^et/.test(code))   return 'エステ';
  if (/^st/.test(code))   return 'ストリップ';

  // 1文字+数字 prefix（短縮形）
  if (/^s\d/.test(code))  return 'ソープ';
  if (/^d\d/.test(code))  return 'デリヘル';
  if (/^h\d/.test(code))  return 'ヘルス';
  if (/^t\d/.test(code))  return '新地';

  return '不明';
}

const BTYPE_LIST = ['ピンサロ','ヘルス','ソープ','デリヘル','エステ','キャバ・セクキャバ','ストリップ','新地','体験記','その他','不明'];

// ═══════════════════════════════════════════════════════════════════════
// 4. CORS プロキシ
// ═══════════════════════════════════════════════════════════════════════
const PROXIES = [
  u => `https://npk-proxy.npk-proxy.workers.dev/?url=${encodeURIComponent(u)}`,
  u => `https://api.allorigins.win/raw?disableCache=true&url=${encodeURIComponent(u)}`,
  u => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`,
  u => `https://api.cors.lol/?url=${encodeURIComponent(u)}`,
  u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
];

async function fetchWithProxy(url) {
  for (const mkProxy of PROXIES) {
    try {
      const res = await fetch(mkProxy(url), { signal: AbortSignal.timeout(28000) });
      if (!res.ok) continue;
      const buf  = await res.arrayBuffer();
      const text = new TextDecoder('shift-jis').decode(buf);
      if (text && text.length > 50) return text;
    } catch { }
  }
  throw new Error(`取得失敗: ${url}`);
}

function yearLabelFromImg(img) {
  if (!img) return '';
  const fname = (img.getAttribute('src') || '').split('/').pop();
  let m = fname.match(/^R0*(\d+)\.png$/i);
  if (m) return `令和${m[1]}年`;
  m = fname.match(/^h(\d+)\.png$/i);
  if (m) return `平成${m[1]}年`;
  m = fname.match(/^s(\d+)\.png$/i);
  if (m) return `昭和${m[1]}年`;
  return '';
}

function yearKey(label) {
  let m = label.match(/令和(\d+)/);  if (m) return 3000 + parseInt(m[1]);
  m = label.match(/平成(\d+)/);       if (m) return 2000 + parseInt(m[1]);
  m = label.match(/昭和(\d+)/);       if (m) return 1000 + parseInt(m[1]);
  return 0;
}

// 5. データロード（localStorage cache 1日）
// ═══════════════════════════════════════════════════════════════════════
const CACHE_KEY = 'pinsalo_v2_data_v1';
const CACHE_TTL = 86400000;

let ALL_REPORTS = [];

async function loadData(forceRefresh = false) {
  if (!forceRefresh) {
    try {
      const raw = localStorage.getItem(CACHE_KEY);
      if (raw) {
        const cached = JSON.parse(raw);
        if (Date.now() - cached.ts < CACHE_TTL && Array.isArray(cached.reports)) {
          ALL_REPORTS = cached.reports;
          return;
        }
      }
    } catch {}
  }

  setProgress(0, 'historyall.htm 取得中…');
  const masterHtml = await fetchWithProxy('https://pinsalo.info/sp/historyall.htm');
  const masterDoc  = new DOMParser().parseFromString(masterHtml, 'text/html');

  const yearPages = Array.from(masterDoc.querySelectorAll('a[href]'))
    .filter(a => {
      const h = a.getAttribute('href') || '';
      return /history[a-z0-9]+\.htm/i.test(h) && !/historyall\.htm/i.test(h);
    })
    .map(a => {
      const img       = a.querySelector('img');
      const yearLabel = yearLabelFromImg(img);
      const href      = a.getAttribute('href');
      return {
        url:   new URL(href, 'https://pinsalo.info/sp/').href,
        label: yearLabel || a.textContent.trim() || href.split('/').pop().replace('.htm','').toUpperCase(),
      };
    });

  if (yearPages.length === 0) throw new Error('年次ページが見つかりませんでした');

  const BATCH = 4;
  const htmlResults = new Array(yearPages.length).fill(null);
  for (let i = 0; i < yearPages.length; i += BATCH) {
    const batch   = yearPages.slice(i, i + BATCH);
    const settled = await Promise.allSettled(batch.map(p => fetchWithProxy(p.url)));
    settled.forEach((r, j) => {
      if (r.status === 'fulfilled') htmlResults[i + j] = r.value;
    });
    const done = Math.min(i + BATCH, yearPages.length);
    setProgress(done / yearPages.length, `${done} / ${yearPages.length} ページ取得`);
  }

  const reports = [];
  const seenUrls = new Set();

  htmlResults.forEach((html, i) => {
    if (!html) return;
    const yUrl   = yearPages[i].url;
    const yLabel = yearPages[i].label;
    const tmp    = document.createElement('div');
    tmp.innerHTML = html;

    tmp.querySelectorAll('a[href]').forEach(a => {
      const raw = a.getAttribute('href') || '';
      if (!raw || /^#|^javascript/i.test(raw)) return;
      let absUrl;
      try { absUrl = new URL(raw, yUrl).href; } catch { return; }
      if (/history[a-z0-9]*\.htm/i.test(absUrl)) return;
      if (!/\.html?($|\?)/i.test(absUrl)) return;

      const text = a.textContent.trim();
      if (text.length < 4) return;
      if (seenUrls.has(absUrl)) return;
      seenUrls.add(absUrl);

      let loc = extractLocation(text);
      if (!loc || loc.length < 1) return;
      loc = normalizeLocation(loc);
      if (!loc || loc.length < 1) return;
      if (isNoise(loc)) return;

      const cls = classify(loc);
      reports.push({
        href: absUrl,
        text,
        year: yLabel,
        loc,
        shop: extractShopName(text),
        btype: btypeFromUrl(absUrl),
        ...cls,
      });
    });
  });

  ALL_REPORTS = reports;

  try {
    localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), reports }));
  } catch (e) {
    console.warn('キャッシュ保存失敗:', e);
  }
}

function setProgress(ratio, text) {
  const bar  = document.getElementById('prog-bar');
  const txt  = document.getElementById('prog-text');
  if (bar) bar.style.width = `${Math.round(ratio * 100)}%`;
  if (txt) txt.textContent = text;
}

function reportsByPref(pref)            { return ALL_REPORTS.filter(r => !r.isOverseas && r.pref === pref); }
function reportsByCountry(country)      { return ALL_REPORTS.filter(r => r.isOverseas && r.country === country); }
function countByPref(pref)              { return reportsByPref(pref).length; }
function countByCountry(country)        { return reportsByCountry(country).length; }

// 7. ナビゲーションスタック
// ═══════════════════════════════════════════════════════════════════════
const navStack = [{ type: 'home', params: {}, scrollY: 0, expandKeys: new Set() }];

function pushView(type, params) {
  const cur = navStack[navStack.length - 1];
  cur.scrollY = window.scrollY;
  cur.expandKeys = collectExpandKeys();
  navStack.push({ type, params, scrollY: 0, expandKeys: new Set() });
  renderCurrent();
  window.scrollTo(0, 0);
  updateBackButton();
}
function goBack() {
  if (navStack.length <= 1) return;
  navStack.pop();
  renderCurrent();
  const prev = navStack[navStack.length - 1];
  requestAnimationFrame(() => requestAnimationFrame(() => window.scrollTo(0, prev.scrollY)));
  updateBackButton();
}
function goHome() {
  navStack.length = 1;
  navStack[0].scrollY = 0;
  navStack[0].expandKeys = new Set();
  renderCurrent();
  window.scrollTo(0, 0);
  updateBackButton();
}
function updateBackButton() {
  document.getElementById('btn-back').disabled = navStack.length <= 1;
}
function collectExpandKeys() {
  // shop card の展開状態を保存
  const set = new Set();
  document.querySelectorAll('.shop-card.expanded').forEach(el => {
    if (el.dataset.shopKey) set.add(el.dataset.shopKey);
  });
  return set;
}

    const div = document.createElement('div');

      <div class="nav-region" data-region="${escHtml(region.name)}">

        <span class="nav-cnt">${total.toLocaleString()}</span>

          return `<div class="nav-pref" data-pref="${escHtml(p)}">
            ${escHtml(p)}<span class="nav-cnt">${c.toLocaleString()}</span>
          </div>`;
        }).join('')}
      </div>`;
    navJp.appendChild(div);
  });

  // 海外
  const navOs = document.getElementById('nav-overseas');
  navOs.innerHTML = '';
  if (overseasCnt > 0) {
    const countries = Object.entries(cnt).filter(([k]) => k.startsWith('_country_'))
      .map(([k, v]) => [k.replace('_country_', ''), v])
      .sort((a, b) => b[1] - a[1]);
    const div = document.createElement('div');
    div.innerHTML = `
      <div class="nav-region" data-region="__overseas__">
        <span><span class="nav-arrow">▶</span> 海外全件</span>
        <span class="nav-cnt">${overseasCnt.toLocaleString()}</span>
      </div>
      <div class="nav-prefs" data-region-prefs="__overseas__">

            ${escHtml(country)}<span class="nav-cnt">${c.toLocaleString()}</span>
          </div>
        `).join('')}
      </div>`;
    navOs.appendChild(div);
  }

  // イベント
  document.querySelectorAll('.nav-region').forEach(el => {
    el.addEventListener('click', () => {
      el.classList.toggle('expanded');
      const target = document.querySelector(`.nav-prefs[data-region-prefs="${el.dataset.region}"]`);
      if (target) target.classList.toggle('expanded');
    });
  });
  document.querySelectorAll('.nav-pref').forEach(el => {
    el.addEventListener('click', () => {
      // sidebar 閉じる（モバイル時）
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('sidebar-overlay').classList.remove('open');
      if (el.dataset.pref) pushView('pref', { pref: el.dataset.pref });
      else if (el.dataset.country) pushView('country', { country: el.dataset.country });
    });
  });
}

function highlightActiveNav() {
  document.querySelectorAll('.nav-pref.active').forEach(el => el.classList.remove('active'));
  const v = navStack[navStack.length - 1];
  if (v.type === 'pref') {
    const el = document.querySelector(`.nav-pref[data-pref="${v.params.pref}"]`);
    if (el) {
      el.classList.add('active');
      // 親リージョンも展開
      const parent = el.closest('.nav-prefs');
      if (parent) parent.classList.add('expanded');
      const region = document.querySelector(`.nav-region[data-region="${parent?.dataset.regionPrefs}"]`);
      if (region) region.classList.add('expanded');
    }
  } else if (v.type === 'country') {
    const el = document.querySelector(`.nav-pref[data-country="${v.params.country}"]`);
    if (el) {
      el.classList.add('active');
      const parent = el.closest('.nav-prefs');
      if (parent) parent.classList.add('expanded');
      const region = document.querySelector(`.nav-region[data-region="__overseas__"]`);
      if (region) region.classList.add('expanded');
    }
  }
}

    html += `<h2 style="font-size:13px;color:var(--muted);margin:14px 4px 6px;font-weight:700">海外 (${overseasCnt.toLocaleString()})</h2>`;

// ─ 都道府県/国ビュー ─

  const reports = isOverseas ? reportsByCountry(name) : reportsByPref(name);
  // フィルタ初期化（業種=全選択、キーワード=空）
  currentFilter = { btypes: new Set(BTYPE_LIST), q: '' };

  const c = document.getElementById('content');
  c.innerHTML = `
    <h1 class="page-title">${escHtml(name)} <span style="font-size:13px;color:var(--muted);font-weight:400">(${reports.length.toLocaleString()}件)</span></h1>
    <p class="page-sub">${isOverseas ? '海外' : '日本'} > ${escHtml(name)}</p>

    <div class="filter-card expanded" id="filter-card">
      <div class="filter-toggle" id="filter-toggle">

        <span style="font-size:12px;color:var(--muted)">クリックで開閉</span>
      </div>
      <div class="filter-body">
        <div class="filter-row">
          <span class="filter-label">業種</span>
          <div id="filter-btypes" style="display:flex;flex-wrap:wrap;gap:6px;flex:1"></div>
        </div>
        <div class="filter-row">
          <span class="filter-label">キーワード</span>
          <input type="text" id="filter-q" class="filter-input" placeholder="店名・地名で絞り込み…">
          <button class="filter-btn" id="filter-clear">クリア</button>
        </div>
      </div>
    </div>

    <div id="shop-area"></div>
  `;

  // 業種チップ
  const btypeBox = document.getElementById('filter-btypes');

  reports.forEach(r => { btypeCnt[r.btype] = (btypeCnt[r.btype] || 0) + 1; });
  BTYPE_LIST.filter(b => btypeCnt[b]).forEach(b => {

    chip.addEventListener('click', () => {
      chip.classList.toggle('active');

// ─ 店舗一覧描画 ─
function renderShopArea(allReports) {
  // フィルタ適用
  const q = currentFilter.q.toLowerCase();
  const filtered = allReports.filter(r => {
    if (!currentFilter.btypes.has(r.btype)) return false;
    if (q && !(r.shop.toLowerCase().includes(q) || r.loc.toLowerCase().includes(q) || r.text.toLowerCase().includes(q))) return false;
    return true;
  });

  const lbl = document.getElementById('filter-cnt-label');
  if (lbl) lbl.textContent = `(${filtered.length.toLocaleString()}件 / ${allReports.length.toLocaleString()}件中)`;

  // 地名 → 店舗 → レポート群
  const locMap = new Map(); // loc → Map<shop, [reports]>
  filtered.forEach(r => {
    if (!locMap.has(r.loc)) locMap.set(r.loc, new Map());
    const m = locMap.get(r.loc);
    if (!m.has(r.shop)) m.set(r.shop, []);
    m.get(r.shop).push(r);
  });
  // 地名は件数順
  const sortedLocs = [...locMap.entries()].sort((a, b) => {
    const aCnt = [...a[1].values()].reduce((s, v) => s + v.length, 0);
    const bCnt = [...b[1].values()].reduce((s, v) => s + v.length, 0);
    return bCnt - aCnt;
  });

  const shopArea = document.getElementById('shop-area');
  if (sortedLocs.length === 0) {
    shopArea.innerHTML = `<div class="empty">該当する店舗・レポートはありません</div>`;
    return;
  }

  // navStack 上の expandKeys を復元用に取得
  const expandKeys = navStack[navStack.length - 1].expandKeys || new Set();

  let html = '';
  sortedLocs.forEach(([loc, shopMap]) => {
    const totalCnt = [...shopMap.values()].reduce((s, v) => s + v.length, 0);
    html += `<div class="loc-section">
      <div class="loc-hd">
        <span>${escHtml(loc)}</span>
        <span class="loc-meta">${shopMap.size}店 / ${totalCnt}件</span>
      </div>
      <div class="shop-list">`;
    const sortedShops = [...shopMap.entries()].sort((a, b) => b[1].length - a[1].length);
    sortedShops.forEach(([shop, reports]) => {
      // 業種は最頻値
      const btypeCnt = {};
      reports.forEach(r => { btypeCnt[r.btype] = (btypeCnt[r.btype] || 0) + 1; });
      const mainBtype = Object.entries(btypeCnt).sort((a, b) => b[1] - a[1])[0][0];
      const shopKey = `${loc}/${shop}`;
      const expandedClass = expandKeys.has(shopKey) ? ' expanded' : '';

      const sortedReports = reports.slice().sort((a, b) => yearKey(b.year) - yearKey(a.year));

      html += `<div class="shop-card${expandedClass}" data-shop-key="${escHtml(shopKey)}">
        <div class="shop-hd" data-shop-toggle="${escHtml(shopKey)}">
          <span class="shop-arrow">▶</span>
          <span class="btype-badge btype-${escHtml(mainBtype)}">${escHtml(mainBtype)}</span>
          <span class="shop-name">${escHtml(shop)}</span>
          <span class="shop-cnt">${reports.length}</span>
        </div>
        <div class="reports-list">`;
      sortedReports.forEach(r => {
        html += `<div class="report-item" data-report-href="${escHtml(r.href)}" data-report-text="${escHtml(r.text)}" data-report-year="${escHtml(r.year)}">
          <span class="report-year">${escHtml(r.year)}</span>
          <span class="report-text">${escHtml(r.text)}</span>
        </div>`;
      });
      html += `</div></div>`;
    });
    html += `</div></div>`;
  });
  shopArea.innerHTML = html;

  // shop ▼ 展開
  shopArea.querySelectorAll('.shop-hd').forEach(el => {
    el.addEventListener('click', () => {
      el.parentElement.classList.toggle('expanded');
    });
  });
  // report タップ
  shopArea.querySelectorAll('.report-item').forEach(el => {
    el.addEventListener('click', () => {
      pushView('report', {
        href: el.dataset.reportHref,
        title: el.dataset.reportText,
        year: el.dataset.reportYear,
      });
    });
  });
}

// ─ レポート本文 ─
async function renderReport(params) {
  const c = document.getElementById('content');
  c.innerHTML = `<div class="loading"><div>レポート読み込み中…</div></div>`;
  updateBreadcrumb();

  try {
    const html = await fetchWithProxy(params.href);
    const baseUrl = params.href;
    const doc = new DOMParser().parseFromString(html, 'text/html');
    doc.querySelectorAll('img').forEach(img => {
      const src = img.getAttribute('src');
      if (src) try { img.src = new URL(src, baseUrl).href; } catch {}
    });
    doc.querySelectorAll('a').forEach(a => {
      const href = a.getAttribute('href');
      if (href && !/^#/.test(href)) try {
        a.href = new URL(href, baseUrl).href;
        a.target = '_blank';
        a.rel = 'noopener';
      } catch {}
    });
    doc.querySelectorAll('script,iframe,noscript').forEach(el => el.remove());
    // 広告除去（旧ビューアと同じパターン）
    ['[src*="dtiserv"]','[href*="dtiserv"]','[src*="affiliate"]','[href*="affiliate"]'].forEach(sel =>
      doc.querySelectorAll(sel).forEach(e => e.remove()));
    const body = doc.body ? doc.body.innerHTML : html;

    c.innerHTML = `
      <h1 class="page-title">${escHtml(params.title || 'レポート')}</h1>
      <p class="page-sub">${escHtml(params.year || '')}
        <a class="ext-link" href="${escHtml(params.href)}" target="_blank" rel="noopener">元ページを開く ↗</a>
      </p>
      <div class="report-body">${body}</div>
    `;
  } catch (e) {
    c.innerHTML = `
      <h1 class="page-title">${escHtml(params.title || 'レポート')}</h1>
      <div class="error">エラー: ${escHtml(e.message)}</div>
      <a class="ext-link" href="${escHtml(params.href)}" target="_blank" rel="noopener">元ページを直接開く ↗</a>`;
  }
}

// breadcrumb
function updateBreadcrumb() {
  const v = navStack[navStack.length - 1];
  const crumbs = ['ホーム'];
  if (v.type === 'pref') crumbs.push(v.params.pref);
  else if (v.type === 'country') crumbs.push('海外', v.params.country);
  else if (v.type === 'report') {
    // 直前のviewから逆引き
    if (navStack.length >= 2) {
      const prev = navStack[navStack.length - 2];
      if (prev.type === 'pref') crumbs.push(prev.params.pref);
      else if (prev.type === 'country') crumbs.push('海外', prev.params.country);
    }
    crumbs.push('レポート');
  }
  const html = crumbs.map((c, i) => {
    const isLast = i === crumbs.length - 1;
    const cls = isLast ? 'crumb-current' : '';
    const sep = i > 0 ? '<span class="crumb-sep">›</span>' : '';
    return sep + `<span class="${cls}">${escHtml(c)}</span>`;
  }).join('');
  document.getElementById('breadcrumb').innerHTML = html;
}

// ═══════════════════════════════════════════════════════════════════════
// 10. ユーティリティ
// ═══════════════════════════════════════════════════════════════════════
function escHtml(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

document.getElementById('btn-back').addEventListener('click', goBack);
document.getElementById('btn-home').addEventListener('click', goHome);
document.getElementById('btn-menu').addEventListener('click', () => {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('open');
});
document.getElementById('sidebar-overlay').addEventListener('click', () => {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('open');
});
document.getElementById('btn-refresh').addEventListener('click', async () => {
  if (!confirm('データを再取得します。よろしいですか？')) return;
  document.getElementById('content').innerHTML = `
    <div class="loading">
      <div>データ再取得中…</div>
      <div class="prog-bar-bg"><div class="prog-bar" id="prog-bar"></div></div>
      <div id="prog-text">準備中</div>
    </div>`;
  try {
    await loadData(true);
    renderSidebar();
    navStack.length = 1;
    navStack[0].scrollY = 0;
    renderCurrent();
    updateBackButton();
    window.scrollTo(0, 0);
  } catch (e) {
    document.getElementById('content').innerHTML = `<div class="error">取得失敗: ${escHtml(e.message)}</div>`;
  }
});

(async () => {
  try {
    await loadData(false);
    renderSidebar();
    renderCurrent();
    updateBackButton();
  } catch (e) {
    document.getElementById('content').innerHTML = `
      <div class="error">初回データ取得失敗: ${escHtml(e.message)}</div>
      <button class="filter-btn primary" style="margin-top:12px" onclick="location.reload()">再試行</button>`;
  }
})();
