<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>日ピン研ビューア v2</title>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --content-fs: 17px;
    --primary: #2563eb;
    --primary-light: #eff6ff;
    --accent-dim: rgba(37,99,235,0.08);
    --bg: #f1f5f9;
    --card: #fff;
    --border: #e2e8f0;
    --border-strong: #cbd5e1;
    --text: #0f172a;
    --muted: #64748b;
    --sub-muted: #94a3b8;
    --accent: #ea580c;
    --header-bg: #1e293b;
    --bottom-h: 56px;
  }
  body.dark {
    --bg: #0f172a; --card: #1e293b; --border: #2d3f55; --border-strong: #3d5068;
    --text: #e2e8f0; --muted: #94a3b8; --sub-muted: #64748b;
    --primary: #60a5fa; --primary-light: rgba(96,165,250,0.12);
    --accent-dim: rgba(96,165,250,0.12);
    --header-bg: #0a1525;
  }
  body {
    font-family: 'Noto Sans JP', 'Helvetica Neue', Arial, 'Hiragino Sans', sans-serif;
    background: var(--bg); color: var(--text);
    font-size: var(--content-fs);
    -webkit-text-size-adjust: 100%;
    height: 100vh; height: 100dvh;
    overflow: hidden;
    display: flex; flex-direction: column;
  }

  /* ── ヘッダー ── */
  header {
    height: 50px; background: var(--header-bg);
    display: flex; align-items: center; padding: 0 4px;
    z-index: 100; flex-shrink: 0;
  }
  .menu-btn {
    width: 42px; height: 42px; display: flex; align-items: center; justify-content: center;
    color: rgba(255,255,255,0.5); cursor: pointer; border-radius: 6px;
    transition: color 0.15s, background 0.15s; flex-shrink: 0;
  }
  .menu-btn:active { color: #fff; background: rgba(255,255,255,0.1); }
  .menu-btn svg { width: 20px; height: 20px; stroke-width: 1.75; }
  .header-title {
    flex: 1; font-weight: 700; color: #fff; text-align: center; font-size: 15px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    padding: 0 4px; letter-spacing: 0.02em; cursor: pointer;
  }
  .header-title:active { opacity: 0.7; }

  /* ── サイドバーオーバーレイ ── */
  #sidebar-overlay {
    position: fixed; inset: 0; background: rgba(15,23,42,0.5);
    z-index: 150; display: none;
  }
  #sidebar-overlay.open { display: block; }

  /* ── サイドバー ── */
  #sidebar {
    position: fixed; top: 0; left: -280px; width: 280px; height: 100%;
    background: var(--card); z-index: 200; transition: transform 0.3s;
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    box-shadow: 4px 0 20px rgba(0,0,0,0.12);
  }
  #sidebar.open { transform: translateX(280px); }
  .sidebar-header {
    padding: 15px; color: var(--primary); font-weight: bold; font-size: 18px;
    border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
    flex-shrink: 0;
  }
  .sidebar-close {
    display: flex; align-items: center; padding: 6px; cursor: pointer; color: var(--muted);
  }
  .sidebar-close svg { width: 18px; height: 18px; }
  #nav-list { flex: 1; overflow-y: auto; }
  .nav-item {
    padding: 13px 20px; border-bottom: 1px solid var(--border);
    font-size: var(--content-fs); font-weight: 500; cursor: pointer;
    color: var(--text); border-left: 3px solid transparent;
    transition: background 0.12s, color 0.12s;
  }
  .nav-item:active { background: var(--accent-dim); color: var(--primary); }
  .nav-item.active {
    border-left-color: var(--primary); color: var(--primary);
    background: var(--primary-light); padding-left: 17px; font-weight: 600;
  }
  .nav-group-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 9px 16px; font-size: 11px; font-weight: 700; color: var(--muted);
    letter-spacing: 0.06em; cursor: pointer; border-bottom: 1px solid var(--border);
    background: var(--bg); user-select: none; transition: background 0.12s;
  }
  .nav-group-header:active { background: var(--accent-dim); }
  .nav-group-header .toggle-icon {
    font-size: 13px; font-weight: 400;
    transition: transform 0.22s; display: inline-block;
  }
  .nav-group-header.open .toggle-icon { transform: rotate(90deg); }
  .nav-group-items { overflow: hidden; transition: max-height 0.28s ease; max-height: 0; }
  .nav-group-items.open { max-height: 800px; }
  .nav-sub-item {
    padding: 10px 20px 10px 32px; border-bottom: 1px solid var(--border);
    font-size: 14px; cursor: pointer; color: var(--text);
    transition: background 0.12s;
  }
  .nav-sub-item:active { background: var(--accent-dim); color: var(--primary); }

  /* ── コンテンツエリア ── */
  #content-area {
    flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
    position: relative; min-height: 0;
    box-shadow: inset 0 6px 8px -6px rgba(0,0,0,0.07);
  }
  .container { max-width: 880px; margin: 0 auto; }

  /* ── フッター（下部ナビ） ── */
  #bottom-nav {
    height: auto; min-height: var(--bottom-h);
    background: var(--card); border-top: 1px solid var(--border);
    display: flex; align-items: stretch;
    padding-bottom: env(safe-area-inset-bottom);
    flex-shrink: 0; box-shadow: 0 -1px 0 var(--border);
  }
  .nav-btn {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 3px; color: var(--muted); font-size: 10px;
    cursor: pointer; padding: 6px 0; transition: color 0.15s; user-select: none;
  }
  .nav-btn:active { color: var(--primary); }
  .nav-btn svg { width: 18px; height: 18px; stroke-width: 1.75; }
  .fs-icon { font-size: 17px; font-weight: 700; line-height: 1; font-family: 'Noto Sans JP', sans-serif; }
  #b-back { transition: none; color: var(--muted) !important; opacity: 1 !important; }
  #b-back:active { color: var(--muted) !important; opacity: 1 !important; }

  /* ── トップページ ナビ要素 ── */
  .nav-category-header {
    padding: 10px 18px 4px; font-size: 11px; font-weight: 700; color: var(--muted);
    letter-spacing: 0.08em; background: var(--bg);
    border-top: 1px solid var(--border); text-transform: uppercase;
  }
  .nav-section-wrap:first-child .nav-category-header { border-top: none; }
  .nav-btn-item {
    display: flex; align-items: center; padding: 13px 18px;
    border-bottom: 1px solid var(--border); font-size: var(--content-fs);
    cursor: pointer; color: var(--text); background: var(--card);
    transition: background 0.12s;
  }
  .nav-btn-item::after {
    content: '›'; margin-left: auto; color: var(--muted);
    font-size: 18px; font-weight: 300;
  }
  .nav-btn-item:active { background: var(--accent-dim); color: var(--primary); }

  /* ── 地域アコーディオン（トップページ レポートセクション） ── */
  .region-accordion { background: var(--card); border-bottom: 1px solid var(--border); }
  .region-accordion-toggle {
    display: flex; align-items: center; padding: 13px 18px;
    font-size: var(--content-fs); font-weight: 500; color: var(--text);
    cursor: pointer; transition: background 0.12s; border-top: 1px solid var(--border);
  }
  .region-accordion-toggle::after {
    content: '›'; margin-left: 8px; color: var(--muted); font-size: 18px;
    font-weight: 300; transition: transform 0.25s; display: inline-block; flex-shrink: 0;
  }
  .region-accordion-toggle.open::after { transform: rotate(90deg); }
  .region-accordion-toggle:active { background: var(--accent-dim); color: var(--primary); }
  .region-cnt {
    font-size: calc(var(--content-fs) - 6px); color: var(--primary); font-weight: 700;
    background: var(--primary-light); padding: 2px 8px; border-radius: 12px;
    margin-left: auto; flex-shrink: 0;
  }
  .region-accordion-body { overflow: hidden; max-height: 0; transition: max-height 0.3s ease; }
  .region-accordion-body.open { max-height: 2000px; }
  .region-pref-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 18px 10px 30px; border-top: 1px solid var(--border);
    font-size: var(--content-fs); color: var(--text);
    cursor: pointer; background: var(--card); transition: background 0.12s;
  }
  .region-pref-item::after { content: '›'; color: var(--muted); font-size: 16px; font-weight: 300; }
  .region-pref-item:active { background: var(--accent-dim); color: var(--primary); }
  .pref-cnt { font-size: 11px; color: var(--primary); font-weight: 600; margin-left: auto; margin-right: 18px; text-align: right; }

  /* ── 都道府県ビュー フィルター ── */
  .pref-view-wrap { padding: 12px; }
  .pref-view-title {
    font-size: calc(var(--content-fs) + 1px); font-weight: 700; margin-bottom: 4px;
  }
  .pref-view-sub { font-size: calc(var(--content-fs) - 4px); color: var(--muted); margin-bottom: 12px; }
  .filter-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; margin-bottom: 12px; overflow: hidden;
  }
  .filter-toggle {
    padding: 10px 14px; cursor: pointer;
    display: flex; justify-content: space-between; align-items: center;
    user-select: none; font-weight: 600;
  }
  .filter-toggle:active { background: var(--bg); }
  .filter-toggle .filter-arrow { transition: transform .15s; font-size: 12px; color: var(--muted); }
  .filter-card.expanded .filter-arrow { transform: rotate(90deg); }
  .filter-body { display: none; padding: 0 14px 14px; border-top: 1px solid var(--border); }
  .filter-card.expanded .filter-body { display: block; }
  .filter-row { margin-top: 12px; display: flex; flex-wrap: wrap; align-items: center; gap: 8px; }
  .filter-label { font-size: calc(var(--content-fs) - 4px); color: var(--muted); font-weight: 600; min-width: 60px; }
  .btype-chip {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 4px 10px; border: 1px solid var(--border);
    border-radius: 16px; cursor: pointer; font-size: calc(var(--content-fs) - 4px);
    background: var(--bg); user-select: none;
  }
  .btype-chip.active { background: var(--primary); color: #fff; border-color: var(--primary); }
  .btype-chip .chip-cnt { font-size: 11px; opacity: .8; }
  .filter-input {
    flex: 1; min-width: 160px; height: 32px; padding: 0 10px;
    border: 1px solid var(--border); border-radius: 6px;
    font-size: calc(var(--content-fs) - 4px); font-family: inherit;
    background: var(--bg); color: var(--text);
  }
  .filter-btn {
    height: 32px; padding: 0 12px; border-radius: 6px;
    border: 1px solid var(--border); background: var(--bg);
    cursor: pointer; font-size: calc(var(--content-fs) - 5px); font-family: inherit; color: var(--text);
  }
  .filter-btn:hover { opacity: .85; }

  /* ── 店舗リスト ── */
  .loc-section { margin: 18px 0 16px; }
  .loc-hd {
    font-size: var(--content-fs); font-weight: 700; padding: 11px 14px;
    background: var(--card); color: var(--text);
    border: 1px solid var(--border); border-left: none;
    border-radius: 12px; margin-bottom: 8px;
    display: flex; align-items: center; gap: 10px;
    box-shadow: 0 1px 2px rgba(15,23,42,0.04);
    cursor: pointer; user-select: none;
    transition: background 0.12s, border-color 0.12s, box-shadow 0.12s;
  }
  .loc-hd:active { background: var(--bg); }
  .loc-hd .loc-hd-main { flex: 1; min-width: 0; }
  .loc-hd .loc-meta {
    font-size: calc(var(--content-fs) - 6px); color: var(--muted); font-weight: 600;
    margin-left: auto; white-space: nowrap;
  }
  .loc-hd::after {
    content: '+'; width: 24px; height: 24px; border-radius: 999px;
    display: inline-flex; align-items: center; justify-content: center;
    border: 1px solid var(--border); background: var(--bg); color: var(--muted);
    font-size: 16px; font-weight: 700; line-height: 1; flex-shrink: 0;
  }
  .loc-section.expanded .loc-hd {
    background: var(--primary-light); border-color: var(--border-strong);
  }
  .loc-section.expanded .loc-hd::after { content: '−'; }
  .loc-arrow { display: none; }
  .shop-list { display: none; flex-direction: column; gap: 4px; }
  .loc-section.expanded .shop-list { display: flex; }
  .shop-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; overflow: hidden;
  }
  .shop-hd {
    padding: 8px 12px; cursor: pointer;
    display: flex; align-items: center; gap: 8px; user-select: none;
  }
  .shop-hd:active { background: var(--bg); }
  .shop-card.expanded .shop-hd { background: var(--primary-light); }
  .shop-arrow { color: var(--muted); transition: transform .15s; font-size: 11px; }
  .shop-card.expanded .shop-arrow { transform: rotate(90deg); }
  .btype-badge {
    font-size: 10px; padding: 2px 6px; border-radius: 4px;
    background: var(--accent); color: #fff; font-weight: 700; flex-shrink: 0;
  }
  .btype-badge.btype-ピンサロ        { background: #ec4899; }
  .btype-badge.btype-ヘルス          { background: #f59e0b; }
  .btype-badge.btype-ソープ          { background: #ef4444; }
  .btype-badge.btype-デリヘル        { background: #8b5cf6; }
  .btype-badge.btype-エステ          { background: #10b981; }
  .btype-badge.btype-キャバ・セクキャバ { background: #14b8a6; }
  .btype-badge.btype-ストリップ      { background: #6366f1; }
  .btype-badge.btype-体験記          { background: #6b7280; }
  .btype-badge.btype-その他          { background: #94a3b8; }
  .btype-badge.btype-不明            { background: #cbd5e1; color: var(--text); }
  .shop-name { flex: 1; font-size: var(--content-fs); word-break: break-all; }
  .shop-cnt {
    font-size: calc(var(--content-fs) - 6px); color: var(--primary); font-weight: 700;
    background: var(--bg); padding: 2px 8px; border-radius: 12px;
    border: 1px solid var(--border); flex-shrink: 0;
  }
  .reports-list {
    display: none; padding: 4px 12px 8px;
    border-top: 1px solid var(--border); background: var(--bg);
  }
  .shop-card.expanded .reports-list { display: block; }
  .report-item {
    padding: 6px 8px; cursor: pointer;
    border-bottom: 1px solid var(--border);
    display: flex; gap: 8px; align-items: flex-start; border-radius: 4px;
  }
  .report-item:active { background: var(--primary-light); }
  .report-item:last-child { border-bottom: 0; }
  .report-year { font-size: 11px; color: var(--muted); font-weight: 600; white-space: nowrap; padding-top: 1px; }
  .report-text { font-size: calc(var(--content-fs) - 4px); word-break: break-all; line-height: 1.4; }


  /* ── 初回ロード画面ロゴ ── */
  .initial-logo-loading {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .initial-logo-loading img {
    display: block;
    height: min(40%, 40vh);
    width: auto;
    max-width: 80vw;
    object-fit: contain;
  }

  /* ── ローディング ── */
  .loading { text-align: center; padding: 40px 20px; color: var(--muted); }
  .prog-bar-bg {
    height: 6px; background: var(--border); border-radius: 3px;
    margin: 16px auto 6px; max-width: 400px;
  }
  .prog-bar { height: 6px; background: var(--primary); border-radius: 3px; width: 0; transition: width .3s; }
  #prog-text { font-size: 12px; }

  /* ── レポート・ページ本文 ── */
  .report-view-hd { padding: 12px 12px 0; }
  .report-view-title { font-size: calc(var(--content-fs) - 1px); font-weight: 700; margin-bottom: 4px; line-height: 1.4; }
  .report-view-sub { font-size: calc(var(--content-fs) - 4px); color: var(--muted); margin-bottom: 8px; }
  .report-body {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 16px; margin: 8px 12px 12px;
    word-break: break-word; line-height: 1.6; font-size: var(--content-fs);
  }
  .report-body img { max-width: 100%; height: auto; border-radius: 4px; }
  .report-body a { color: var(--primary); }
  .report-body table { max-width: 100%; border-collapse: collapse; }
  .report-body td, .report-body th { border: 1px solid var(--border); padding: 4px 6px; font-size: calc(var(--content-fs) - 4px); }
  .report-body p { margin: 0.5em 0; }

  /* ── レガシーページ ナビボタン（cf_only移植） ── */
  .nav-btn-group { display: flex; flex-direction: column; border-bottom: 1px solid var(--border); background: var(--surface); }
  .nav-btn-group a[data-nav-btn] { display: flex; align-items: center; padding: 13px 18px; border-bottom: 1px solid var(--border); background: transparent; color: var(--text); font-size: var(--content-fs); font-weight: 500; cursor: pointer; text-decoration: none; transition: background 0.12s; }
  .nav-btn-group a[data-nav-btn]::after { content: '›'; margin-left: auto; color: var(--muted); font-size: 18px; font-weight: 300; }
  .nav-btn-group a[data-nav-btn]:active { background: var(--accent-dim); color: var(--accent); }
  .genre-tabs { display: flex; flex-wrap: wrap; gap: 6px; padding: 10px 14px; background: var(--surface); border-bottom: 1px solid var(--border); }
  .genre-tab { padding: 4px 12px; border-radius: 20px; font-size: calc(var(--content-fs) - 4px); font-weight: 500; background: var(--bg); border: 1px solid var(--border); color: var(--muted); cursor: pointer; text-decoration: none; }
  .genre-tab.active { background: var(--primary); color: #fff; border-color: var(--primary); }
  #content .box1, #content .box2, #content .box3, #content p, #content td, #content th, #content li { font-size: var(--content-fs); }
  #content table { font-size: var(--content-fs); }

  /* ── 全期間・更新履歴一覧（再構築ビュー） ── */
  .history-all-wrap { padding: 12px; }
  .history-all-title {
    font-size: calc(var(--content-fs) + 2px); font-weight: 700; margin-bottom: 4px;
  }
  .history-all-sub {
    font-size: calc(var(--content-fs) - 4px); color: var(--muted); margin-bottom: 12px;
    line-height: 1.5;
  }
  .history-era-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    overflow: hidden; margin-bottom: 12px;
  }
  .history-era-hd {
    padding: 10px 14px; background: var(--bg); border-bottom: 1px solid var(--border);
    color: var(--muted); font-size: calc(var(--content-fs) - 4px); font-weight: 700;
    letter-spacing: .06em;
  }
  .history-year-item {
    display: flex; align-items: center; gap: 10px; padding: 13px 14px;
    border-bottom: 1px solid var(--border); cursor: pointer; background: var(--card);
    color: var(--text); transition: background .12s, color .12s;
  }
  .history-year-item:last-child { border-bottom: 0; }
  .history-year-item:active { background: var(--accent-dim); color: var(--primary); }
  .history-year-main { font-size: var(--content-fs); font-weight: 700; }
  .history-year-code {
    font-size: calc(var(--content-fs) - 6px); color: var(--muted);
    background: var(--bg); border: 1px solid var(--border); border-radius: 999px;
    padding: 2px 8px; flex-shrink: 0;
  }
  .history-year-count {
    margin-left: auto; color: var(--primary); font-size: calc(var(--content-fs) - 4px);
    font-weight: 700; flex-shrink: 0;
  }
  .history-year-item::after {
    content: '›'; color: var(--muted); font-size: 18px; font-weight: 300;
  }


  /* ── エラー・リンク・空 ── */
  .error {
    color: #dc2626; padding: 12px; margin: 12px;
    background: #fef2f2; border: 1px solid #fecaca; border-radius: 8px;
  }
  .ext-link {
    display: inline-block; margin: 8px 12px; font-size: 13px;
    color: var(--primary); text-decoration: none;
  }
  .ext-link:hover { text-decoration: underline; }
  .empty { padding: 40px 20px; text-align: center; color: var(--muted); }


  /* ── レガシーページ 軽量カードUI（組織・参加 / 研究・情報） ── */
  .org-legacy-wrap { padding: 12px; }
  .org-legacy-title-card {
    background: linear-gradient(135deg, var(--primary-light), var(--card));
    border: 1px solid var(--border); border-radius: 12px;
    padding: 14px 16px; margin-bottom: 12px;
  }
  .org-legacy-title { font-size: calc(var(--content-fs) + 1px); font-weight: 700; margin-bottom: 4px; }
  .org-legacy-sub { font-size: calc(var(--content-fs) - 5px); color: var(--muted); line-height: 1.5; }
  .org-legacy-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 16px; margin-bottom: 12px;
    box-shadow: 0 1px 3px rgba(15, 23, 42, 0.05);
    line-height: 1.7; overflow-wrap: anywhere;
  }
  .org-legacy-card a { color: var(--primary); }
  .org-legacy-card table { width: 100%; max-width: 100%; border-collapse: collapse; }
  .org-legacy-card td, .org-legacy-card th { border: 1px solid var(--border); padding: 6px 8px; }
  .org-legacy-card img { max-width: 100%; height: auto; }
  .org-legacy-nav { padding: 0 12px 12px; }

function isNoise(loc) {
  if (!loc) return true;
  if (NOISE_EXACT.has(loc)) return true;
  if (/^[\d０-９]+$/.test(loc)) return true;
  if (/^[０-９の]+[\d０-９]+$/.test(loc)) return true;
  if (/^[\d０-９][\d０-９]+$/.test(loc)) return true;
  if (/^R\d+年/.test(loc)) return true;
  if (/^H\d+年/.test(loc)) return true;
  if (/^皇紀\d+/.test(loc)) return true;
  if (/\d{4}年版$/.test(loc)) return true;
  if (/^\d{4}\.\d+$/.test(loc)) return true;
  if (/^\d{4}\.\d+現在$/.test(loc)) return true;
  if (/R\d+\.\d+現在$/.test(loc)) return true;
  if (/\d+現在$/.test(loc)) return true;
  if (/\d+月\d+日現在$/.test(loc)) return true;
  if (/^\d{2}\.\d{2}版$/.test(loc)) return true;
  if (/H\d{2}\.\d{2}\.\d{2}版$/.test(loc)) return true;
  if (/版$/.test(loc) && /[\d\.]+/.test(loc)) return true;
  if (/ by /.test(loc)) return true;
  if (/） by /.test(loc)) return true;
  if (/\) by /.test(loc)) return true;
  if (/法$/.test(loc) && loc.length <= 8) return true;
  if (['性感染症','抗生物質','摘発モデルの導入','コストパフォーマンス',
       '児童ポルノ関連法','性感マッサージ','韓国式エステ'].includes(loc)) return true;
  if (/^改訂\d+版$/.test(loc)) return true;
  if (/^第\d+版/.test(loc)) return true;
  if (/^「/.test(loc)) return true;
  return false;
}

function normalizeLocation(loc) {
  if (!loc) return null;
  if (/編$/.test(loc) && loc.length >= 3) {
    const base = loc.replace(/編$/, '');
    if (base.length < 2) return null;
    return base;
  }
  if (/市$/.test(loc) && loc.length >= 3) {
    const base = loc.replace(/市$/, '');
    if (LOC_PREF[base]) return base;
  }
  return loc;
}

function extractLocation(text) {
  let m = text.match(/」（([^）\)・･]{1,20})/);
  if (m) return m[1].trim();
  m = text.match(/」\(([^）\)・･]{1,20})/);
  if (m) return m[1].trim();
  m = text.match(/（([^）\)・･]{1,10})[）\)]/);
  if (m) return m[1].trim();
  return null;
}

function extractShopName(text) {
  const m = text.match(/「([^」]+)」/);
  if (m) return m[1].trim();
  return text.trim();
}

function classify(loc) {
  if (OVERSEAS_COUNTRY[loc]) return { isOverseas: true, country: OVERSEAS_COUNTRY[loc] };
  if (LOC_PREF[loc]) return {
    isOverseas: false,
    pref: LOC_PREF[loc],
    subregion: SUBREGION_MAP[loc] || null,
  };
  return { isOverseas: false, pref: '不明', subregion: null };
}

function legacyLabelFromImgSrc(img) {
  const fname = (img.getAttribute('src') || '').split('/').pop();
  let m = fname.match(/^R0*(\d+)\.png$/i);
  if (m) return `令和${m[1]}年`;
  m = fname.match(/^h(\d+)\.png$/i);
  if (m) return `平成${m[1]}年`;
  return '';
}

function legacyMergeNavControl(base, extra) {
  if (!extra || Object.keys(extra).length === 0) return base;
  const result = { ...base };
  if (extra.hideCategories) result.hideCategories = new Set([...(base.hideCategories || []), ...extra.hideCategories]);
  if (extra.hideLabels)     result.hideLabels     = new Set([...(base.hideLabels     || []), ...extra.hideLabels]);
  if (extra.hideFnames)     result.hideFnames     = new Set([...(base.hideFnames     || []), ...extra.hideFnames]);
  if (extra.hideGenreTabs)  result.hideGenreTabs  = true;
  if (extra.hideAreaGroup)  result.hideAreaGroup  = true;
  if (extra.renameLabels)   result.renameLabels   = new Map([...(base.renameLabels || new Map()), ...extra.renameLabels]);
  return result;
}

function legacyReplaceImgButtons(doc, currentUrl = null) {
  const currentFname = (currentUrl || '').split('/').pop().split('?')[0].toLowerCase();
  const isRegionPage = LEGACY_REGION_NAV_PAGES.has(currentFname);
  const prefFnames   = new Set(LEGACY_NAV_CATEGORY_DEFS.find(c => c.label === '地域')?.fnames || []);
  const isPrefPage   = prefFnames.has(currentFname);
  const navControl   = legacyMergeNavControl(
    LEGACY_PAGE_NAV_CONTROL[currentFname] || {},
    LEGACY_PAGE_NAV_CHILD_CONTROL[legacyNavFromFname] || {}
  );

  const navEntries = [];
  const genreTabs  = [];

  doc.querySelectorAll('a').forEach(a => {
    if (a.textContent.trim()) return;
    const img = a.querySelector('img');
    if (!img) return;

    const href = a.getAttribute('href') || '';
    let label = '';
    let finalHref = href;
    let fname = '';
    let isYear = false;

    if (href.startsWith('mailto:')) {
      const mParent = a.parentNode;
      a.remove();
      if (mParent && mParent !== doc.body && !mParent.textContent.trim() && mParent.children.length === 0) mParent.remove();
      return;
    } else {
      const jtpMatch = href.match(/JavaScript:TP\(['"](.+?)['"]\)/i);
      if (jtpMatch) finalHref = new URL(jtpMatch[1], 'https://pinsalo.info/sp/').href;
      fname = finalHref.split('/').pop().split('?')[0];

      const imgFname  = (img.getAttribute('src') || '').split('/').pop();
      const yearLabel = legacyLabelFromImgSrc(img);
      if (LEGACY_NAV_LABELS[fname]) {
        label = LEGACY_NAV_LABELS[fname];
      } else if (LEGACY_GENRE_IMG_MAP[imgFname]) {
        if (!navControl.hideGenreTabs) {
          genreTabs.push({ href: finalHref, label: LEGACY_GENRE_IMG_MAP[imgFname] });
        }
        const gParent = a.parentNode;
        a.remove();
        if (gParent && gParent !== doc.body && !gParent.textContent.trim() && gParent.children.length === 0) gParent.remove();
        return;
      } else if (yearLabel) {
        label = yearLabel;
        isYear = true;
      } else {
        label = img.getAttribute('alt') || '';
      }
    }

    if (!label) return;

    const btn = doc.createElement('a');
    btn.setAttribute('href', finalHref);
    btn.setAttribute('data-nav-btn', '');
    btn.textContent = label;
    navEntries.push({ btn, fname, isYear });

    const parent = a.parentNode;
    a.remove();
    if (parent && parent !== doc.body && !parent.textContent.trim() && parent.children.length === 0) parent.remove();
  });

  doc.querySelectorAll('img').forEach(img => {
    if (/pinsalo\.info\/img\//i.test(img.getAttribute('src') || '')) img.remove();
  });

  (function cleanEmpty(el) {
    if (/\bbox[123]\b/.test(el.className)) return;
    if (/^(br|hr|wbr)$/i.test(el.tagName)) return;
    Array.from(el.children).forEach(cleanEmpty);
    if (el === doc.body) return;
    const text = (el.textContent || '').replace(/[\s 　]/g, '');
    if (!text && !el.querySelector('a[href],img[src],input,select,textarea')) el.remove();
  })(doc.body);

  if (navEntries.length === 0 && genreTabs.length === 0) return;

  const homeEntry = navEntries.find(e => e.fname === LEGACY_NAV_HOME_FNAME);
  let homeGroup = null;
  if (homeEntry) {
    homeGroup = doc.createElement('div');
    homeGroup.className = 'nav-btn-group';
    homeGroup.appendChild(homeEntry.btn);
    doc.body.insertBefore(homeGroup, doc.body.firstChild);
  }

  if (genreTabs.length > 0) {
    const tabStrip = doc.createElement('div');
    tabStrip.className = 'genre-tabs';
    genreTabs.forEach(({ href, label }) => {
      const tabFname = href.split('/').pop().split('?')[0].toLowerCase();
      const tab = doc.createElement('a');
      tab.setAttribute('href', href);
      tab.setAttribute('data-nav-btn', '');
      tab.className = 'genre-tab' + (tabFname === currentFname ? ' active' : '');
      tab.textContent = label;
      tabStrip.appendChild(tab);
    });
    const afterHome = homeGroup ? homeGroup.nextSibling : doc.body.firstChild;
    doc.body.insertBefore(tabStrip, afterHome);
  }

  const catGroup = doc.createElement('div');
  catGroup.className = 'nav-btn-group';
  let hasCatBtns = false;

  LEGACY_NAV_CATEGORY_DEFS.forEach(cat => {
    if (navControl.hideCategories?.has(cat.label)) return;
    const fnameSet = new Set(cat.fnames);
    let catEntries;
    if (cat.label === 'レポート') {
      if (isPrefPage) return;
      catEntries = navEntries.filter(e => fnameSet.has(e.fname) || e.isYear);
      catEntries.sort((a, b) => {
        const ai = a.isYear ? 999 : cat.fnames.indexOf(a.fname);
        const bi = b.isYear ? 999 : cat.fnames.indexOf(b.fname);
        return ai - bi;
      });
    } else {
      catEntries = navEntries.filter(e => fnameSet.has(e.fname));
    }
    if (navControl.hideFnames) catEntries = catEntries.filter(e => !navControl.hideFnames.has(e.fname));
    if (catEntries.length === 0) return;

    const displayLabel = (cat.label === '地域' && isRegionPage) ? 'エリア（広域）'
      : (navControl.renameLabels?.get(cat.label) ?? cat.label);

    if (!navControl.hideLabels?.has(cat.label)) {
      const header = doc.createElement('div');
      header.className = 'nav-category-header';
      header.textContent = displayLabel;
      catGroup.appendChild(header);
    }
    catEntries.forEach(e => catGroup.appendChild(e.btn));
    hasCatBtns = true;
  });

  const categorizedFnames = new Set([
    LEGACY_NAV_HOME_FNAME,
    ...LEGACY_NAV_CATEGORY_DEFS.flatMap(cat => cat.fnames),
  ]);
  const uncategorized = navEntries.filter(e => !categorizedFnames.has(e.fname) && !e.isYear);

  let areaGroup = null;
  if (uncategorized.length > 0 && !navControl.hideAreaGroup) {
    areaGroup = doc.createElement('div');
    areaGroup.className = 'nav-btn-group';
    const areaHeader = doc.createElement('div');
    areaHeader.className = 'nav-category-header';
    areaHeader.textContent = isPrefPage ? 'エリア（詳細）'
      : (navControl.renameLabels?.get('地区') ?? '地区');
    areaGroup.appendChild(areaHeader);
    uncategorized.forEach(e => areaGroup.appendChild(e.btn));
  }

  if (hasCatBtns || areaGroup) {
    const isEmptyNode = n => {
      if (n.nodeType === 3) return !n.textContent.replace(/[\s ]/g, '');
      if (n.nodeType !== 1) return true;
      const text = n.textContent.replace(/[\s ]/g, '');
      return !text && !n.querySelector('a,img,input,button,select,textarea');
    };
    let cur = homeGroup ? homeGroup.nextSibling : doc.body.firstChild;
    while (cur) {
      const next = cur.nextSibling;
      if (isEmptyNode(cur)) { cur.remove(); cur = next; }
      else break;
    }

    let bodyText = '';
    for (const child of doc.body.childNodes) {
      if (child !== homeGroup) bodyText += (child.textContent || '').replace(/[\s ]/g, '');
    }
    if (bodyText.length > 10) {
      if (areaGroup) doc.body.appendChild(areaGroup);
      if (hasCatBtns) doc.body.appendChild(catGroup);
    } else {
      const insertBefore = homeGroup ? homeGroup.nextSibling : null;
      if (areaGroup) doc.body.insertBefore(areaGroup, insertBefore);
      if (hasCatBtns) doc.body.insertBefore(catGroup, areaGroup ? areaGroup.nextSibling : insertBefore);
    }
  }
}

async function fetchLegacy(url) {
  const candidates = /\/sp\/ranking\.php(?:$|[?#])/i.test(url)
    ? [
        url,
        url.replace(/ranking\.php/i, 'ranking.htm'),
        url.replace(/\/sp\/ranking\.php/i, '/ranking.php'),
        url.replace(/\/sp\/ranking\.php/i, '/ranking.htm'),
      ]
    : [url];
  let lastErr = null;

  for (const candidateUrl of candidates) {
    const proxyUrl = `https://npk-proxy.npk-proxy.workers.dev/?url=${encodeURIComponent(candidateUrl)}`;
    dbgLegacy('fetchLegacy:start', { url: candidateUrl, originalUrl: url, proxyUrl });
    const started = performance.now();
    let res;
    try {
      res = await fetch(proxyUrl, { signal: AbortSignal.timeout(28000) });
    } catch (err) {
      lastErr = err;
      dbgLegacyError('fetchLegacy:fetch failed', { url: candidateUrl, message: err?.message });
      continue;
    }

    dbgLegacy('fetchLegacy:response', { url: candidateUrl, ok: res.ok, status: res.status, ms: Math.round(performance.now() - started) });
    if (!res.ok) {
      lastErr = new Error(`HTTP ${res.status}`);
      if (res.status === 404) continue;
      throw lastErr;
    }

    const buf  = await res.arrayBuffer();
    dbgLegacy('fetchLegacy:arrayBuffer', { url: candidateUrl, bytes: buf.byteLength });
    const utf8 = new TextDecoder('utf-8').decode(buf);
    const m = utf8.match(/charset\s*=\s*["']?([^\s"';>]+)/i);
    const declared = (m ? m[1].trim().toLowerCase() : 'utf-8');
    dbgLegacy('fetchLegacy:charset', { url: candidateUrl, declared, utf8Length: utf8.length, sample: utf8.slice(0, 120) });
    if (declared.includes('shift') || declared.includes('sjis') || declared === 'x-sjis') {
      try {
        const sjis = new TextDecoder('shift-jis').decode(buf);
        dbgLegacy('fetchLegacy:decoded', { url: candidateUrl, encoding: 'shift-jis', length: sjis.length, sample: sjis.slice(0, 120) });
        return sjis;
      } catch (err) {
        dbgLegacyError('fetchLegacy:shift-jis decode failed; fallback utf-8', err);
        return utf8;
      }
    }
    dbgLegacy('fetchLegacy:decoded', { url: candidateUrl, encoding: 'utf-8', length: utf8.length });
    return utf8;
  }

  throw lastErr || new Error('取得できる候補URLがありません');
}

  doc.querySelectorAll('[src],[href]').forEach(el => {

  });

  [
    'script','noscript','iframe','object','embed','ins','ads',

const PROXIES = [
  u => `https://npk-proxy.npk-proxy.workers.dev/?url=${encodeURIComponent(u)}`,
  u => `https://api.allorigins.win/raw?disableCache=true&url=${encodeURIComponent(u)}`,
  u => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`,
  u => `https://api.cors.lol/?url=${encodeURIComponent(u)}`,
  u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
];

async function fetchWithProxy(url) {
  for (const mkProxy of PROXIES) {
    try {
      const res = await fetch(mkProxy(url), { signal: AbortSignal.timeout(28000) });
      if (!res.ok) continue;
      const buf  = await res.arrayBuffer();
      const text = new TextDecoder('shift-jis').decode(buf);
      if (text && text.length > 50) return text;
    } catch { }
  }
  throw new Error(`取得失敗: ${url}`);
}

function yearLabelFromImg(img) {
  if (!img) return '';
  const fname = (img.getAttribute('src') || '').split('/').pop();
  let m = fname.match(/^R0*(\d+)\.png$/i);
  if (m) return `令和${m[1]}年`;
  m = fname.match(/^h(\d+)\.png$/i);
  if (m) return `平成${m[1]}年`;
  m = fname.match(/^s(\d+)\.png$/i);
  if (m) return `昭和${m[1]}年`;
  return '';
}

function yearKey(label) {
  let m = label.match(/令和(\d+)/);  if (m) return 3000 + parseInt(m[1]);
  m = label.match(/平成(\d+)/);       if (m) return 2000 + parseInt(m[1]);
  m = label.match(/昭和(\d+)/);       if (m) return 1000 + parseInt(m[1]);
  return 0;
}

// 5. データロード（localStorage cache 1日）
// ═══════════════════════════════════════════════════════════════════════
const CACHE_KEY = 'pinsalo_v2_data_v1';
const CACHE_TTL = 86400000;

let ALL_REPORTS = [];

async function loadData(forceRefresh = false) {
  if (!forceRefresh) {
    try {
      const raw = localStorage.getItem(CACHE_KEY);
      if (raw) {
        const cached = JSON.parse(raw);
        if (Date.now() - cached.ts < CACHE_TTL && Array.isArray(cached.reports)) {
          ALL_REPORTS = cached.reports;
          return;
        }
      }
    } catch {}
  }

  setProgress(0, 'historyall.htm 取得中…');
  const masterHtml = await fetchWithProxy('https://pinsalo.info/sp/historyall.htm');
  const masterDoc  = new DOMParser().parseFromString(masterHtml, 'text/html');

  const yearPages = Array.from(masterDoc.querySelectorAll('a[href]'))
    .filter(a => {
      const h = a.getAttribute('href') || '';
      return /history[a-z0-9]+\.htm/i.test(h) && !/historyall\.htm/i.test(h);
    })
    .map(a => {
      const img       = a.querySelector('img');
      const yearLabel = yearLabelFromImg(img);
      const href      = a.getAttribute('href');
      return {
        url:   new URL(href, 'https://pinsalo.info/sp/').href,
        label: yearLabel || a.textContent.trim() || href.split('/').pop().replace('.htm','').toUpperCase(),
      };
    });

  if (yearPages.length === 0) throw new Error('年次ページが見つかりませんでした');

  const BATCH = 4;
  const htmlResults = new Array(yearPages.length).fill(null);
  for (let i = 0; i < yearPages.length; i += BATCH) {
    const batch   = yearPages.slice(i, i + BATCH);
    const settled = await Promise.allSettled(batch.map(p => fetchWithProxy(p.url)));
    settled.forEach((r, j) => {
      if (r.status === 'fulfilled') htmlResults[i + j] = r.value;
    });
    const done = Math.min(i + BATCH, yearPages.length);
    setProgress(done / yearPages.length, `${done} / ${yearPages.length} ページ取得`);
  }

  const reports = [];
  const seenUrls = new Set();

  htmlResults.forEach((html, i) => {
    if (!html) return;
    const yUrl   = yearPages[i].url;
    const yLabel = yearPages[i].label;
    const tmp    = document.createElement('div');
    tmp.innerHTML = html;

    tmp.querySelectorAll('a[href]').forEach(a => {
      const raw = a.getAttribute('href') || '';
      if (!raw || /^#|^javascript/i.test(raw)) return;
      let absUrl;
      try { absUrl = new URL(raw, yUrl).href; } catch { return; }
      if (/history[a-z0-9]*\.htm/i.test(absUrl)) return;
      if (!/\.html?($|\?)/i.test(absUrl)) return;

      const text = a.textContent.trim();
      if (text.length < 4) return;
      if (seenUrls.has(absUrl)) return;
      seenUrls.add(absUrl);

      let loc = extractLocation(text);
      if (!loc || loc.length < 1) return;
      loc = normalizeLocation(loc);
      if (!loc || loc.length < 1) return;
      if (isNoise(loc)) return;

      const cls = classify(loc);
      reports.push({
        href: absUrl,
        text,
        year: yLabel,
        loc,
        shop: extractShopName(text),
        btype: btypeFromUrl(absUrl),
        ...cls,
      });
    });
  });

  ALL_REPORTS = reports;

  try {
    localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), reports }));
  } catch (e) {
    console.warn('キャッシュ保存失敗:', e);
  }
}

  const txt = document.getElementById('prog-text');
  if (bar) bar.style.width = `${Math.round(ratio * 100)}%`;
  if (txt) txt.textContent = text;
}

const navStack = [{ type: 'home', params: {}, scrollY: 0, expandKeys: new Set(), locExpandKeys: new Set() }];

function pushView(type, params) {
  const cur = navStack[navStack.length - 1];
  cur.scrollY = getScrollTop();
  cur.expandKeys = collectExpandKeys();
  cur.locExpandKeys = collectLocExpandKeys();
  navStack.push({ type, params, scrollY: 0, expandKeys: new Set(), locExpandKeys: new Set() });
  renderCurrent();
  setScrollTop(0);
  updateBackButton();
}

function goBack() {
  if (navStack.length <= 1) return;
  const cur = navStack[navStack.length - 1];
  cur.scrollY = getScrollTop();
  cur.expandKeys = collectExpandKeys();
  cur.locExpandKeys = collectLocExpandKeys();

  navStack.pop();
  const prev = navStack[navStack.length - 1];
  if (prev.type !== 'legacy') {
    legacyCurrentUrl = '';
    legacyNavFromFname = null;
  }
  renderCurrent();
  requestAnimationFrame(() => requestAnimationFrame(() => setScrollTop(prev.scrollY || 0)));
  updateBackButton();
}

function goHome() {
  legacyCurrentUrl = '';
  legacyNavFromFname = null;
  navStack.length = 1;
  navStack[0].scrollY = 0;
  navStack[0].expandKeys = new Set();
  navStack[0].locExpandKeys = new Set();
  renderCurrent();
  setScrollTop(0);
  updateBackButton();
}

function updateBackButton() {
  const btn = document.getElementById('b-back');
  if (btn) btn.style.opacity = '1';
}

function collectExpandKeys() {
  const set = new Set();
  document.querySelectorAll('.shop-card.expanded').forEach(el => {
    if (el.dataset.shopKey) set.add(el.dataset.shopKey);
  });
  return set;
}

function collectLocExpandKeys() {
  const set = new Set();
  document.querySelectorAll('.loc-section.expanded').forEach(el => {
    if (el.dataset.loc) set.add(el.dataset.loc);
  });
  return set;
}

  const view = navStack[navStack.length - 1];
  // nav-top active 状態
  document.getElementById('nav-top')?.classList.toggle('active', view.type === 'home');
  document.getElementById('nav-all')?.classList.toggle('active', view.type === 'historyAll');

  switch (view.type) {
    case 'home':    renderHome();                              break;
    case 'pref':    renderFilteredView(view.params.pref,  reportsByPref(view.params.pref), { hideRegionFilter: true });    break;
    case 'country': renderFilteredView(view.params.country, reportsByCountry(view.params.country)); break;
    case 'year':    renderYearView(view.params.year);          break;
    case 'historyAll': renderHistoryAllView();                 break;
    case 'page':    renderPageView(view.params);              return; // async
    case 'report':  renderReport(view.params);                return; // async
    case 'legacy':  renderLegacyView(view.params);            return; // async
  }
}

// ─ 今日のレポート取得（非同期）─
async function fetchTodayReports(container) {
  const hdr = container.querySelector('.nav-category-header');
  try {
    const html = await fetchWithProxy('https://pinsalo.info/sp/today.htm');
    const doc  = new DOMParser().parseFromString(html, 'text/html');
    const todayReports = Array.from(doc.querySelectorAll('a[href]'))
      .map(a => {
        const text = a.textContent.trim();
        if (!text) return null;
        const raw = a.getAttribute('href') || '';
        if (!/\.html?/i.test(raw)) return null;
        try {
          return { text, href: new URL(raw, 'https://pinsalo.info/sp/').href };
        } catch {
          return null;
        }
      })
      .filter(Boolean);

    hdr.textContent = `今日のレポート（${todayReports.length}件）`;
    todayReports.forEach(({ text, href }) => {
      const item = document.createElement('div');
      item.className = 'nav-btn-item';
      item.textContent = text;
      item.onclick = () => pushView('report', { href, title: text, year: '' });
      container.appendChild(item);
    });
  } catch {
    hdr.textContent = '今日のレポート（取得失敗）';
  }
}

// ─ 地域アコーディオン要素生成 ─
function buildRegionAccordionEl(region, prefCnt) {
  const total = region.prefs.reduce((s, p) => s + (prefCnt[p] || 0), 0);
  const wrap = document.createElement('div');
  wrap.className = 'region-accordion';

  const toggle = document.createElement('div');
  toggle.className = 'region-accordion-toggle';
  toggle.innerHTML = `${escHtml(region.name)}<span class="region-cnt">${total.toLocaleString()}件</span>`;

  const body = document.createElement('div');
  body.className = 'region-accordion-body';

  region.prefs.forEach(p => {
    const c = prefCnt[p] || 0;
    if (c === 0) return;
    const item = document.createElement('div');
    item.className = 'region-pref-item';
    item.innerHTML = `<span>${escHtml(p)}</span><span class="pref-cnt">${c.toLocaleString()}件</span>`;
    item.onclick = () => { closeSidebar(); pushView('pref', { pref: p }); };
    body.appendChild(item);
  });

  toggle.onclick = () => {
    toggle.classList.toggle('open');
    body.classList.toggle('open');
  };

  wrap.appendChild(toggle);
  wrap.appendChild(body);
  return wrap;
}

// ─ 海外アコーディオン要素生成 ─
function buildOverseasAccordionEl() {
  const countryCnt = {};
  ALL_REPORTS.filter(r => r.isOverseas).forEach(r => {
    countryCnt[r.country] = (countryCnt[r.country] || 0) + 1;
  });
  const overseasCnt = Object.values(countryCnt).reduce((s, v) => s + v, 0);

  const wrap = document.createElement('div');
  wrap.className = 'region-accordion';

  const toggle = document.createElement('div');
  toggle.className = 'region-accordion-toggle';
  toggle.innerHTML = `海外<span class="region-cnt">${overseasCnt.toLocaleString()}件</span>`;

  const body = document.createElement('div');
  body.className = 'region-accordion-body';

  Object.entries(countryCnt).sort((a, b) => b[1] - a[1]).forEach(([country, c]) => {
    const item = document.createElement('div');
    item.className = 'region-pref-item';

}

// 11. 都道府県 / 国 / 年 フィルタービュー
// ═══════════════════════════════════════════════════════════════════════
let currentFilter = { region: '', prefs: new Set(), country: '', btypes: new Set(), q: '' }; // btypesが空なら全業種表示


function getRegionNameByPref(pref) {
  const region = REGIONS.find(r => r.prefs.includes(pref));
  return region ? region.name : '';
}

function prefBelongsToRegion(pref, regionName) {
  if (!pref || !regionName) return false;
  const region = REGIONS.find(r => r.name === regionName);
  return !!region && region.prefs.includes(pref);
}

function syncRegionDetailSelection() {
  // 広域エリアと都道府県/国は親子関係として扱う。
  // 親と矛盾する子条件が残っていた場合は、AND条件で破綻しないように破棄する。
  if (!currentFilter.region) {
    currentFilter.prefs = new Set();
    currentFilter.country = '';
    return;
  }
  if (currentFilter.region === '海外') {
    currentFilter.prefs = new Set();
    return;
  }
  currentFilter.country = '';
  currentFilter.prefs = new Set([...currentFilter.prefs].filter(pref => prefBelongsToRegion(pref, currentFilter.region)));
}

function countReportsByRegion(reports) {
  const counts = new Map();
  REGIONS.forEach(region => counts.set(region.name, 0));
  counts.set('海外', 0);
  reports.forEach(r => {
    if (r.isOverseas) counts.set('海外', (counts.get('海外') || 0) + 1);
    else {
      const regionName = getRegionNameByPref(r.pref);
      if (regionName) counts.set(regionName, (counts.get(regionName) || 0) + 1);
    }
  });
  return counts;
}

function countReportsByPrefInRegion(reports, regionName) {
  const counts = new Map();
  const region = REGIONS.find(r => r.name === regionName);
  if (!region) return counts;
  region.prefs.forEach(pref => counts.set(pref, 0));
  reports.forEach(r => {
    if (!r.isOverseas && counts.has(r.pref)) counts.set(r.pref, (counts.get(r.pref) || 0) + 1);
  });
  return counts;
}

function countReportsByCountry(reports) {
  const counts = new Map();
  reports.forEach(r => {
    if (r.isOverseas && r.country) counts.set(r.country, (counts.get(r.country) || 0) + 1);
  });
  return counts;
}

function applyRegionFilterOnly(reports) {
  syncRegionDetailSelection();

  return reports.filter(r => {
    // 地域ブロック未選択時は、地域条件なし。
    if (!currentFilter.region) return true;

    // 海外は「海外 AND 国」で絞り込む。
    if (currentFilter.region === '海外') {
      if (!r.isOverseas) return false;
      if (currentFilter.country && r.country !== currentFilter.country) return false;
      return true;
    }

    // 国内は「広域エリア AND 都道府県」で絞り込む。
    if (r.isOverseas) return false;
    const reportRegion = getRegionNameByPref(r.pref);
    if (reportRegion !== currentFilter.region) return false;
    if (currentFilter.prefs.size > 0) {
      if (!currentFilter.prefs.has(r.pref)) return false;
    }
    return true;
  });
}


function renderBtypeFilterChips(reports) {
  const btypeBox = document.getElementById('filter-btypes');
  if (!btypeBox) return;

  const regionFiltered = applyRegionFilterOnly(reports);
  const btypeCnt = {};
  regionFiltered.forEach(r => { btypeCnt[r.btype] = (btypeCnt[r.btype] || 0) + 1; });

  // 地域条件変更で0件になった業種は選択状態から外す
  currentFilter.btypes = new Set([...currentFilter.btypes].filter(b => btypeCnt[b] > 0));

  btypeBox.innerHTML = '';
  BTYPE_LIST.filter(b => btypeCnt[b]).forEach(b => {
    const chip = document.createElement('span');
    chip.className = 'btype-chip' + (currentFilter.btypes.has(b) ? ' active' : '');
    chip.dataset.btype = b;
    chip.innerHTML = `${escHtml(b)} <span class="chip-cnt">${btypeCnt[b].toLocaleString()}</span>`;
    chip.addEventListener('click', () => {
      if (currentFilter.btypes.has(b)) currentFilter.btypes.delete(b);
      else currentFilter.btypes.add(b);
      renderBtypeFilterChips(reports);
      renderShopArea(reports);
    });
    btypeBox.appendChild(chip);
  });
}

function renderRegionFilterChips(reports) {
  const regionBox = document.getElementById('filter-regions');
  const detailRow = document.getElementById('filter-region-detail-row');
  const detailLabel = document.getElementById('filter-region-detail-label');
  const detailBox = document.getElementById('filter-region-detail');
  if (!regionBox || !detailRow || !detailLabel || !detailBox) return;

  const regionCounts = countReportsByRegion(reports);
  const regionNames = [...REGIONS.map(r => r.name), '海外'];
  regionBox.innerHTML = regionNames
    .filter(name => (regionCounts.get(name) || 0) > 0)
    .map(name => `<span class="btype-chip region-chip${currentFilter.region === name ? ' active' : ''}" data-region="${escHtml(name)}">${escHtml(name)} <span class="chip-cnt">${(regionCounts.get(name) || 0).toLocaleString()}</span></span>`)
    .join('');

  regionBox.querySelectorAll('.region-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      const selected = chip.dataset.region || '';
      currentFilter.region = currentFilter.region === selected ? '' : selected;
      currentFilter.prefs = new Set();
      currentFilter.country = '';
      renderRegionFilterChips(reports);
      renderBtypeFilterChips(reports);
      renderShopArea(reports);
    });
  });

  detailBox.innerHTML = '';
  if (!currentFilter.region) {
    detailRow.style.display = 'none';
    return;
  }

  if (currentFilter.region === '海外') {
    const countries = [...countReportsByCountry(reports).entries()].filter(([, count]) => count > 0).sort((a, b) => b[1] - a[1]);
    detailLabel.textContent = '国';
    detailBox.innerHTML = countries.map(([country, count]) =>
      `<span class="btype-chip country-chip${currentFilter.country === country ? ' active' : ''}" data-country="${escHtml(country)}">${escHtml(country)} <span class="chip-cnt">${count.toLocaleString()}</span></span>`
    ).join('');
    detailBox.querySelectorAll('.country-chip').forEach(chip => {
      chip.addEventListener('click', () => {
        const selected = chip.dataset.country || '';
        currentFilter.country = currentFilter.country === selected ? '' : selected;
        renderRegionFilterChips(reports);
        renderBtypeFilterChips(reports);
        renderShopArea(reports);
      });
    });
  } else {
    const prefs = [...countReportsByPrefInRegion(reports, currentFilter.region).entries()].filter(([, count]) => count > 0);
    detailLabel.textContent = '都道府県';
    detailBox.innerHTML = prefs.map(([pref, count]) =>
      `<span class="btype-chip pref-chip${currentFilter.prefs.has(pref) ? ' active' : ''}" data-pref="${escHtml(pref)}">${escHtml(pref)} <span class="chip-cnt">${count.toLocaleString()}</span></span>`
    ).join('');
    detailBox.querySelectorAll('.pref-chip').forEach(chip => {
      chip.addEventListener('click', () => {
        const selected = chip.dataset.pref || '';
        if (currentFilter.prefs.has(selected)) currentFilter.prefs.delete(selected);
        else currentFilter.prefs.add(selected);
        renderRegionFilterChips(reports);
        renderBtypeFilterChips(reports);
        renderShopArea(reports);
      });
    });
  }
  detailRow.style.display = detailBox.children.length ? 'flex' : 'none';
}

function renderFilteredView(title, reports, options = {}) {
  const hideRegionFilter = !!options.hideRegionFilter;
  currentFilter = { region: '', prefs: new Set(), country: '', btypes: new Set(), q: '' };
  currentPageUrl = '';
  document.getElementById('page-title').textContent = title;

  const c = document.getElementById('content');
  c.innerHTML = '';

  // ヘッダー
  const hd = document.createElement('div');
  hd.className = 'pref-view-wrap';
  hd.innerHTML = `
    <div class="pref-view-title">${escHtml(title)}
      <span style="font-size:13px;color:var(--muted);font-weight:400">(${reports.length.toLocaleString()}件)</span>
    </div>
    <div class="filter-card" id="filter-card">
      <div class="filter-toggle" id="filter-toggle">
        <span><span class="filter-arrow">▶</span> フィルター <span id="filter-cnt-label" style="color:var(--muted);font-size:12px;font-weight:400"></span></span>
      </div>
      <div class="filter-body">
        
        <div class="filter-row">
          <span class="filter-label">業種</span>
          <div id="filter-btypes" style="display:flex;flex-wrap:wrap;gap:6px;flex:1"></div>
        </div>
        <div class="filter-row">
          <span class="filter-label">キーワード</span>
          <input type="text" id="filter-q" class="filter-input" placeholder="店名・地名で絞り込み…">
          <button class="filter-btn" id="filter-clear">クリア</button>
        </div>
      </div>
    </div>`;
  c.appendChild(hd);

  // 地域チップ（都道府県ページでは非表示）
  if (!hideRegionFilter) renderRegionFilterChips(reports);

  // 業種チップ（地域・都道府県・国フィルタに連動）
  renderBtypeFilterChips(reports);

  // フィルター開閉
  document.getElementById('filter-toggle').addEventListener('click', () => {
    document.getElementById('filter-card').classList.toggle('expanded');
  });

  const qInput = document.getElementById('filter-q');
  qInput.addEventListener('input', () => {
    currentFilter.q = qInput.value.trim();
    renderShopArea(reports);
  });
  // クリア
  document.getElementById('filter-clear').addEventListener('click', () => {
    qInput.value = '';
    currentFilter.q = '';
    currentFilter.region = '';
    currentFilter.prefs = new Set();
    currentFilter.country = '';
    document.querySelectorAll('.btype-chip').forEach(el => el.classList.remove('active'));
    currentFilter.btypes = new Set();
    if (!hideRegionFilter) renderRegionFilterChips(reports);
    renderBtypeFilterChips(reports);
    renderShopArea(reports);
  });

  // 店舗エリア
  const shopAreaWrap = document.createElement('div');
  shopAreaWrap.className = 'pref-view-wrap';
  const shopArea = document.createElement('div');
  shopArea.id = 'shop-area';
  shopAreaWrap.appendChild(shopArea);
  c.appendChild(shopAreaWrap);

  renderShopArea(reports);
}

// ─ 店舗一覧描画 ─
function renderShopArea(allReports) {
  // フィルター更新で再描画しても、詳細地域の展開状態を維持する
  const currentView = navStack[navStack.length - 1];
  const openedLocsBeforeRender = collectLocExpandKeys();
  if (openedLocsBeforeRender.size > 0) currentView.locExpandKeys = openedLocsBeforeRender;

  const q = currentFilter.q.toLowerCase();
  const filtered = applyRegionFilterOnly(allReports).filter(r => {
    // 業種未選択時は全業種を表示。1つ以上選択されている場合のみOR条件で絞り込み。
    if (currentFilter.btypes.size > 0 && !currentFilter.btypes.has(r.btype)) return false;
    if (q && !(r.shop.toLowerCase().includes(q) || r.loc.toLowerCase().includes(q) || r.text.toLowerCase().includes(q))) return false;
    return true;
  });

  const lbl = document.getElementById('filter-cnt-label');
  if (lbl) lbl.textContent = `(${filtered.length.toLocaleString()}件 / ${allReports.length.toLocaleString()}件中)`;

  const locMap = new Map();
  filtered.forEach(r => {
    if (!locMap.has(r.loc)) locMap.set(r.loc, new Map());
    const m = locMap.get(r.loc);
    if (!m.has(r.shop)) m.set(r.shop, []);
    m.get(r.shop).push(r);
  });

  const sortedLocs = [...locMap.entries()].sort((a, b) => {
    const aCnt = [...a[1].values()].reduce((s, v) => s + v.length, 0);
    const bCnt = [...b[1].values()].reduce((s, v) => s + v.length, 0);
    return bCnt - aCnt;
  });

  const shopArea = document.getElementById('shop-area');
  if (sortedLocs.length === 0) {
    shopArea.innerHTML = `<div class="empty">該当する店舗・レポートはありません</div>`;
    return;
  }

  const expandKeys = currentView.expandKeys || new Set();
  const locExpandKeys = currentView.locExpandKeys || new Set();
  let html = '';

  sortedLocs.forEach(([loc, shopMap]) => {
    const totalCnt = [...shopMap.values()].reduce((s, v) => s + v.length, 0);
    const locExpandedClass = locExpandKeys.has(loc) ? ' expanded' : '';
    html += `<div class="loc-section${locExpandedClass}" data-loc="${escHtml(loc)}">
      <div class="loc-hd" data-loc-toggle="${escHtml(loc)}">
        <span class="loc-hd-main"><span class="loc-arrow">▶</span><span>${escHtml(loc)}</span></span>
        <span class="loc-meta">${shopMap.size.toLocaleString()}店 / ${totalCnt.toLocaleString()}レポート</span>
      </div>
      <div class="shop-list">`;
    const sortedShops = [...shopMap.entries()].sort((a, b) => b[1].length - a[1].length);
    sortedShops.forEach(([shop, reports]) => {
      const btypeCnt = {};
      reports.forEach(r => { btypeCnt[r.btype] = (btypeCnt[r.btype] || 0) + 1; });
      const mainBtype = Object.entries(btypeCnt).sort((a, b) => b[1] - a[1])[0][0];
      const shopKey = `${loc}/${shop}`;
      const expandedClass = expandKeys.has(shopKey) ? ' expanded' : '';
      const sortedReports = reports.slice().sort((a, b) => yearKey(b.year) - yearKey(a.year));

      html += `<div class="shop-card${expandedClass}" data-shop-key="${escHtml(shopKey)}">
        <div class="shop-hd" data-shop-toggle="${escHtml(shopKey)}">
          <span class="shop-arrow">▶</span>
          <span class="btype-badge btype-${escHtml(mainBtype)}">${escHtml(mainBtype)}</span>
          <span class="shop-name">${escHtml(shop)}</span>
          <span class="shop-cnt">${reports.length}</span>
        </div>
        <div class="reports-list">`;
      sortedReports.forEach(r => {
        html += `<div class="report-item" data-report-href="${escHtml(r.href)}" data-report-text="${escHtml(r.text)}" data-report-year="${escHtml(r.year)}">
          <span class="report-year">${escHtml(r.year)}</span>
          <span class="report-text">${escHtml(r.text)}</span>
        </div>`;
      });
      html += `</div></div>`;
    });
    html += `</div></div>`;
  });

  shopArea.innerHTML = html;

  shopArea.querySelectorAll('.loc-hd').forEach(el => {
    el.addEventListener('click', () => {
      const section = el.closest('.loc-section');
      if (!section) return;
      section.classList.toggle('expanded');
      currentView.locExpandKeys = collectLocExpandKeys();
    });
  });

  shopArea.querySelectorAll('.shop-hd').forEach(el => {
    el.addEventListener('click', () => {
      el.parentElement.classList.toggle('expanded');
      currentView.expandKeys = collectExpandKeys();
    });
  });
  shopArea.querySelectorAll('.report-item').forEach(el => {
    el.addEventListener('click', () => {
      pushView('report', {
        href: el.dataset.reportHref,
        title: el.dataset.reportText,
        year: el.dataset.reportYear,
      });
    });
  });
}

async function renderReport(params) {
  currentPageUrl = params.href || '';
  document.getElementById('page-title').textContent = params.title || 'レポート';

  const c = document.getElementById('content');
  c.innerHTML = `<div class="loading"><div>レポート読み込み中…</div></div>`;

  try {
    const html   = await fetchWithProxy(params.href);
    const baseUrl = params.href;
    const doc    = new DOMParser().parseFromString(html, 'text/html');
    doc.querySelectorAll('img').forEach(img => {
      const src = img.getAttribute('src');
      if (src) try { img.src = new URL(src, baseUrl).href; } catch {}
    });
    doc.querySelectorAll('a').forEach(a => {
      const href = a.getAttribute('href');
      if (href && !/^#/.test(href)) try {
        a.href = new URL(href, baseUrl).href;
        a.target = '_blank'; a.rel = 'noopener';
      } catch {}
    });
    doc.querySelectorAll('script,iframe,noscript').forEach(el => el.remove());
    ['[src*="dtiserv"]','[href*="dtiserv"]','[src*="affiliate"]','[href*="affiliate"]'].forEach(sel =>
      doc.querySelectorAll(sel).forEach(e => e.remove()));
    const body = doc.body ? doc.body.innerHTML : html;

    c.innerHTML = `<div class="report-body">${body}</div>`;
  } catch (e) {
    c.innerHTML = `
      <div class="report-view-hd">
        <div class="report-view-title">${escHtml(params.title || 'レポート')}</div>
      </div>
      <div class="error">エラー: ${escHtml(e.message)}</div>
      <a class="ext-link" href="${escHtml(params.href)}" target="_blank" rel="noopener">元ページを直接開く ↗</a>`;
  }
}

// ═══════════════════════════════════════════════════════════════════════
// 13. 汎用ページ表示（研究・情報 / 組織・参加 等）
// ═══════════════════════════════════════════════════════════════════════

    doc.querySelectorAll('img').forEach(img => {
      const src = img.getAttribute('src');
      if (src) try { img.src = new URL(src, params.url).href; } catch {}
    });
    doc.querySelectorAll('a').forEach(a => {

    c.innerHTML = `

      </div>
      <div class="error">取得失敗: ${escHtml(e.message)}</div>

}

// ═══════════════════════════════════════════════════════════════════════
// 14. サイドバー年期間リスト構築
// ═══════════════════════════════════════════════════════════════════════
function buildYearSidebar() {
  const years = new Set(ALL_REPORTS.map(r => r.year).filter(Boolean));

  const reiwa = [], heiseiLate = [], heiseiEarly = [];
  years.forEach(y => {
    const mR = y.match(/令和(\d+)/);
    const mH = y.match(/平成(\d+)/);
    if (mR) reiwa.push({ year: y, n: parseInt(mR[1]) });
    else if (mH && parseInt(mH[1]) >= 21) heiseiLate.push({ year: y, n: parseInt(mH[1]) });
    else if (mH) heiseiEarly.push({ year: y, n: parseInt(mH[1]) });
  });

  reiwa.sort((a, b) => b.n - a.n);
  heiseiLate.sort((a, b) => b.n - a.n);
  heiseiEarly.sort((a, b) => b.n - a.n);

  buildYearGroup('reiwa-list',       '令和',   reiwa,      y => `R${String(y.n).padStart(2,'0')}`);
  buildYearGroup('heisei-late-list', '平成後期', heiseiLate, y => `H${y.n}`);
  buildYearGroup('heisei-early-list','平成前期', heiseiEarly,y => `H${y.n}`);
}

function buildYearGroup(containerId, label, items, fmtLabel) {
  if (items.length === 0) return;
  const container = document.getElementById(containerId);
  const first = items[items.length - 1];
  const last  = items[0];
  const range = `(${fmtLabel(first)}-${fmtLabel(last)})`;

  const hdr = document.createElement('div');
  hdr.className = 'nav-group-header';
  hdr.innerHTML = `<span>${escHtml(label)} ${escHtml(range)}</span><span class="toggle-icon">▶</span>`;

  const itemsWrap = document.createElement('div');
  itemsWrap.className = 'nav-group-items';

  items.forEach(({ year }) => {
    const el = document.createElement('div');
    el.className = 'nav-sub-item';
    el.textContent = year;
    el.onclick = () => {
      closeSidebar();
      pushView('year', { year });
    };
    itemsWrap.appendChild(el);
  });

  hdr.onclick = () => {
    hdr.classList.toggle('open');
    itemsWrap.classList.toggle('open');
  };

  container.appendChild(hdr);
  container.appendChild(itemsWrap);
}

// ═══════════════════════════════════════════════════════════════════════

// ═══════════════════════════════════════════════════════════════════════
// 17. ダークモード切替
// ═══════════════════════════════════════════════════════════════════════
function applyTheme(dark) {
  document.body.classList.toggle('dark', dark);
  const icon = document.querySelector('#theme-toggle i');
  if (icon) icon.setAttribute('data-lucide', dark ? 'sun' : 'moon');
  if (typeof lucide !== 'undefined') lucide.createIcons();
  localStorage.setItem('pinsalo_v2_theme', dark ? 'dark' : 'light');
}

document.getElementById('theme-toggle').onclick = () => {
  applyTheme(!document.body.classList.contains('dark'));
};

// 起動時テーマ復元
if (localStorage.getItem('pinsalo_v2_theme') === 'dark') {
  document.body.classList.add('dark');
}

// ═══════════════════════════════════════════════════════════════════════
// 17-B. レガシーコンテンツ内リンク捕捉
// ═══════════════════════════════════════════════════════════════════════
document.getElementById('content').addEventListener('click', e => {
  if (!legacyCurrentUrl) return;
  const a = e.target.closest('a');
  if (!a || !a.href) return;
  const href = a.href;
  if (/pinsalo\.info/i.test(href) && !/\.(jpe?g|png|gif|webp|css|js)(\?|$)/i.test(href)) {
    e.preventDefault();
    e.stopPropagation();
    openLegacyPage(href, a.textContent.trim() || href.split('/').pop());
  }
}, true);

// データ再取得ボタン
document.getElementById('m-reload').onclick = async () => {
  if (!confirm('データを再取得します。よろしいですか？')) return;
  const c = document.getElementById('content');
  c.innerHTML = `
    <div class="loading">
      <div>データ再取得中…</div>
      <div class="prog-bar-bg"><div class="prog-bar" id="prog-bar"></div></div>
      <div id="prog-text">準備中</div>
    </div>`;
  try {
    await loadData(true);
    buildYearSidebar();
    navStack.length = 1;
    navStack[0].scrollY = 0;
    navStack[0].expandKeys = new Set();
    navStack[0].locExpandKeys = new Set();
    renderCurrent();
    updateBackButton();
    setScrollTop(0);
  } catch (e) {
    c.innerHTML = `<div class="error">取得失敗: ${escHtml(e.message)}</div>
      <button style="margin:12px;padding:8px 16px;background:var(--primary);color:#fff;border:none;border-radius:6px;cursor:pointer;" onclick="location.reload()">再試行</button>`;
  }
};

// ═══════════════════════════════════════════════════════════════════════
// 19. 起動
// ═══════════════════════════════════════════════════════════════════════
(async () => {
  // Lucide アイコン初期化
  if (typeof lucide !== 'undefined') lucide.createIcons();

  // 保存済みテーマを適用（ダーク時はアイコン更新）
  if (localStorage.getItem('pinsalo_v2_theme') === 'dark') {
    applyTheme(true);
  }

  try {
    await loadData(false);
    buildYearSidebar();
    renderCurrent();
    updateBackButton();
  } catch (e) {
    document.getElementById('content').innerHTML = `
      <div class="error" style="margin:12px;">初回データ取得失敗: ${escHtml(e.message)}</div>
      <button style="margin:12px;padding:8px 16px;background:var(--primary);color:#fff;border:none;border-radius:6px;cursor:pointer;" onclick="location.reload()">再試行</button>`;
  }
})();
