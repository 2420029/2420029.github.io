<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>日ピン研 Mobile Viewer V2</title>
<style>
  /* 前回のスタイルを継承しつつ、デバッグ用にエラー表示を強化 */
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Share+Tech+Mono&display=swap');
  :root {
    --bg: #0d0f14; --surface: #151820; --border: #252a35;
    --accent: #e8a838; --text: #c8ccda; --muted: #555e72;
    --header-h: 50px; --bottom-h: 56px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { height: 100vh; background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; overflow: hidden; display: flex; flex-direction: column; }
  
  header { height: var(--header-h); background: var(--surface); display: flex; align-items: center; padding: 0 15px; border-bottom: 1px solid var(--border); z-index: 100; }
  .menu-btn { font-size: 24px; color: var(--accent); cursor: pointer; margin-right: 15px; }
  .header-title { flex: 1; font-family: 'Share Tech Mono'; font-weight: bold; color: var(--accent); font-size: 14px; }

  /* コンテンツエリア */
  #content-area { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; position: relative; }
  #rendered { padding: 15px; display: none; }
  #rendered a { color: #7ab3e0; text-decoration: none; }
  
  /* 状態表示 */
  #status-overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--bg); z-index: 50; }
  .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* サイドバー (ドロワー) */
  #sidebar { position: absolute; top: 0; left: -280px; width: 280px; height: 100%; background: var(--surface); z-index: 200; transition: left .3s; display: flex; flex-direction: column; box-shadow: 5px 0 15px rgba(0,0,0,0.5); }
  #sidebar.open { left: 0; }
  #sidebar-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.7); z-index: 150; display: none; }
  #sidebar-overlay.open { display: block; }
  .nav-item { padding: 15px 20px; border-bottom: 1px solid var(--border); font-size: 14px; cursor: pointer; }
  .nav-item:active { background: rgba(255,255,255,0.05); }

  /* ボトムナビ */
  #bottom-nav { height: var(--bottom-h); background: var(--surface); border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-around; padding-bottom: env(safe-area-inset-bottom); }
  .nav-btn { flex: 1; text-align: center; color: var(--muted); font-size: 10px; }
  .nav-btn i { display: block; font-size: 18px; font-style: normal; margin-bottom: 2px; }

  /* エラーログ用 */
  #log-box { font-family: 'Share Tech Mono', monospace; font-size: 10px; color: #d64040; margin-top: 10px; text-align: center; padding: 0 20px; }
</style>
</head>
<body>

<div id="sidebar-overlay"></div>
<div id="sidebar">
  <div style="padding: 20px; border-bottom: 1px solid var(--border); color: var(--accent); font-weight: bold;">MENU</div>
  <div class="nav-item" data-url="https://pinsalo.info/sp/pink.htm">🏠 トップページ</div>
  <div class="nav-item" data-url="https://pinsalo.info/sp/historyall.htm">📋 更新履歴一覧</div>
  <div class="nav-item" data-url="https://pinsalo.info/sp/historyp.htm">令和6年履歴</div>
  <div style="padding: 20px; color: var(--muted); font-size: 11px;">※リンクをタップして開始</div>
</div>

<header>
  <div class="menu-btn" id="open-menu">☰</div>
  <div class="header-title">PIN-LAB MOBILE</div>
  <div class="menu-btn" id="reload-btn">↺</div>
</header>

<div id="content-area">
  <div id="status-overlay">
    <div class="spinner" id="spinner"></div>
    <div id="status-msg">ページを選択してください</div>
    <div id="log-box"></div>
  </div>
  <div id="rendered"></div>
</div>

<nav id="bottom-nav">
  <div class="nav-btn" id="back-btn"><i>←</i>戻る</div>
  <div class="nav-btn" id="home-btn"><i>🏠</i>TOP</div>
  <div class="nav-btn" id="ext-btn"><i>↗</i>ブラウザ</div>
</nav>

<script>
const statusMsg = document.getElementById('status-msg');
const logBox = document.getElementById('log-box');
const renderedEl = document.getElementById('rendered');
const statusOverlay = document.getElementById('status-overlay');
const sidebar = document.getElementById('sidebar');
const overlay = document.getElementById('sidebar-overlay');

let currentUrl = "";
const historyStack = [];

// ── プロキシ設定（生存率が高いものを優先） ──
const PROXIES = [
  { url: "https://api.allorigins.win/raw?url=", encode: true },
  { url: "https://api.codetabs.com/v1/proxy?quest=", encode: true },
  { url: "https://corsproxy.io/?", encode: true }
];

// ── 通信関数 ──
async function fetchPage(url) {
  logBox.textContent = "";
  let lastError = "";

  // 複数のプロキシを順に試す
  for (const proxy of PROXIES) {
    try {
      const target = proxy.url + (proxy.encode ? encodeURIComponent(url) : url);
      console.log("Trying proxy:", target);
      
      const response = await fetch(target);
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      
      const arrayBuffer = await response.arrayBuffer();
      
      // 日本語文字化け対策 (Shift-JIS)
      const decoder = new TextDecoder('shift-jis');
      let text = decoder.decode(arrayBuffer);
      
      // もしデコード結果が極端に短い場合は失敗とみなす
      if (text.length < 100) throw new Error("Content too short");
      
      return text;
    } catch (e) {
      console.warn(`Proxy failed: ${proxy.url}`, e);
      lastError = e.message;
      logBox.textContent += `Proxy error: ${e.message}\n`;
    }
  }
  throw new Error("すべての接続経路が失敗しました。");
}

// ── 描画関数 ──
function render(html, baseUrl) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');
  const baseObj = new URL(baseUrl);

  // 1. 画像とリンクのURLを絶対パスに変換
  const fixUrl = (attr) => {
    doc.querySelectorAll(`[${attr}]`).forEach(el => {
      try {
        const raw = el.getAttribute(attr);
        if (raw.startsWith('http')) return;
        const abs = new URL(raw, baseObj).href;
        el.setAttribute(attr, abs);
      } catch(e) {}
    });
  };
  fixUrl('src');
  fixUrl('href');

  // 2. リンクの挙動をビューア内乗っ取りに変更
  doc.querySelectorAll('a').forEach(a => {
    const href = a.getAttribute('href');
    if (href && href.includes('pinsalo.info')) {
      a.onclick = (e) => {
        e.preventDefault();
        loadPage(href);
      };
    } else {
      a.target = "_blank";
    }
  });

  // 3. 不要なスクリプト等を削除
  doc.querySelectorAll('script, iframe, ins, ads').forEach(el => el.remove());

  // 4. 反映
  renderedEl.innerHTML = doc.body.innerHTML;
  
  // スタイル微調整
  renderedEl.querySelectorAll('*').forEach(el => {
    if (el.style.backgroundColor) el.style.backgroundColor = 'transparent';
    if (el.style.color === 'black' || el.style.color === 'rgb(0, 0, 0)') el.style.color = 'inherit';
  });

  renderedEl.style.display = 'block';
  statusOverlay.style.display = 'none';
  document.getElementById('content-area').scrollTop = 0;
}

// ── メインロード関数 ──
async function loadPage(url, push = true) {
  if (!url) return;
  if (push && currentUrl) historyStack.push(currentUrl);
  
  currentUrl = url;
  statusOverlay.style.display = 'flex';
  renderedEl.style.display = 'none';
  statusMsg.textContent = "データを取得中...";
  sidebar.classList.remove('open');
  overlay.classList.remove('open');

  try {
    const html = await fetchPage(url);
    render(html, url);
  } catch (e) {
    statusMsg.textContent = "読み込みエラー";
    logBox.textContent = e.message;
    document.getElementById('spinner').style.display = 'none';
  }
}

// ── UIイベント ──
document.getElementById('open-menu').onclick = () => {
  sidebar.classList.add('open');
  overlay.classList.add('open');
};
overlay.onclick = () => {
  sidebar.classList.remove('open');
  overlay.classList.remove('open');
};
document.querySelectorAll('.nav-item').forEach(item => {
  item.onclick = () => loadPage(item.dataset.url);
});
document.getElementById('reload-btn').onclick = () => loadPage(currentUrl, false);
document.getElementById('home-btn').onclick = () => loadPage('https://pinsalo.info/sp/pink.htm');
document.getElementById('back-btn').onclick = () => {
  if (historyStack.length > 0) loadPage(historyStack.pop(), false);
};
document.getElementById('ext-btn').onclick = () => {
  if (currentUrl) window.open(currentUrl, '_blank');
};

// 初期表示
loadPage('https://pinsalo.info/sp/pink.htm');
</script>
</body>
</html>
